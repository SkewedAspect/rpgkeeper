abilities:
  - name: Subspecies Options
    description: |-
      A player choosing to play a Nikto character must choose one of the following subspecies. No matter which
      subspecies is chosen, no skills may be trained above rank 2 during character creation.


      **Kajain'sa'Niktos (Red Niktos):** Kajain'sa'Niktos begin the game with one rank in Resilience. When making
      skill checks, Red Niktos may remove <setback/> imposed due to arid or hot environmental conditions.


      **Kadas'sa'Niktos (Green Niktos):** Kadas'sa'Niktos begin the game with one rank in Coordination. They also
      gain <boost/> to Athletics checks made to climb trees and other surfaces their claws can pierce. When a Green
      Nikto makes Brawl checks to deal damage to an opponent, he deals +1 damage and has a Critical Rating of 3.


      **Esral'sa'Niktos (Mountain Niktos):** Esral'sa'Niktos begin the game with one rank in Survival. They also
      gain the Natural Outdoorsman talent (once per game session, a Mountain Nikto may reroll any one Resilience or
      Survival check).


      **Gluss'sa'Niktos (Pale Niktos):** Gluss'sa'Niktos begin the game with one rank in Athletics. A Pale Nikto
      never suffers movement penalties for traveling through water and can hold his breath for a number of rounds
      equal to twice his Brawn rating before beginning to drown.


      **M'shento'su'Niktos (Southern Niktos):** M'shento'su'Niktos begin the game with one rank in Perception.
      Southern Niktos may add <boost/> to Perception and Vigilance checks to detect sounds.
