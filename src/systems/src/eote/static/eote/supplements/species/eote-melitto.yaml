startingXP: 100
abilities:
  - name: Sightless Vision
    description: |-
      Melittos can perceive their surroundings without needing light, and they never suffer penalties on combat or
      Perception checks due to darkness or other environmental factors that affect vision.
  - name: Reliant on Toxins
    description: |-
      Melittos require the toxins of their native atmosphere to live; offworld, they gain free special respirators to
      emulate the conditions of their homeworld. They treat standard planetary air composition as a corrosive
      atmosphere with rating 6.
