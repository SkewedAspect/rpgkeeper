abilities:
  - name: Large
    description: |-
      At character creation, a Dowutin's player must choose whether the character has a silhouette of 1 or a silhouette
      of 2.
  - name: Immovable
    description: |-
      Dowutins who suffer the effects of being immobilized, knocked prone, or otherwise moved against their will may
      suffer 3 strain as an out-of-turn incidental to avoid the effect. Dowutins who are silhouette 2 only suffer 1
      strain to use this ability.
