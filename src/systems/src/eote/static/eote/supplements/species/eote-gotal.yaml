abilities:
  - name: Energy Sensitivity
    description: |-
      Once per encounter as a maneuver, a Gotal may sense the presence and current emotional states of all living
      things within short range of himself. In addition, Gotals add <advantage/> to Charm, Deception, and
      Negotiation checks they make when interacting with living sentient beings within short range.
