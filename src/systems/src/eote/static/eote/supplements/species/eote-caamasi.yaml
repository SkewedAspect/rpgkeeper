abilities:
  - name: Memnii
    description: Caamasi often imprint significant events in their life as unfading memories called memnii. Once per game
      session, a Caamasi may form a new memnii that encompasses one scene or encounter. At any time, a Caamasi may
      perfectly recall any memnii that he has formed or witnessed, or share it with another Caamasi or a Force-sensitive
      character.
