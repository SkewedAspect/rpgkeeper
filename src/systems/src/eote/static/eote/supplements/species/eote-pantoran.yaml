id: eote-pantoran
name: Pantoran
description: |-
  These blue-skinned near-humans come from a cold climate and were vibrant participants in galactic society during the
  time of the Republic. In the time of the Galactic Civil War, the democratic and politically active Pantorans have
  found themselves in a precarious position in galactic politics, one rife with disaster but also promise.

  **Physiology:** Pantorans are a near-human species with skin of various shades of blue and yellow eyes (with some rare
  instances of black). Their hair ranges in color from black and blue to light purple and white. They have an average
  height similar to that of humans, a bit less than two meters. Their physiology allows them to be comfortable in lower
  temperatures, requiring only a couple of layers of casual clothing in icy climates. In all other aspects, Pantorans
  are nearly identical to humans.

  **Society:** Fiercely independent believers in freedom and democracy, the Pantorans still have small cultural
  hold-overs from a more feudal era. Pantorans wear yellow marks on their forehead, under their eyes, and on their
  cheeks to denote their family names and lineages. Most Pantorans have a general interest in geneology and history, and
  enhoy spending time searching for long-lost relatives and connections to ancient heroes and historical figures. A few
  Pantorans still hold noble titles. Some also wear headwear and jewelry proudly denoting birthplaces and associated
  famous geographic regions where ancient Pantoran battles, treaties, artistic works, and the like occured. However, in
  this current age, Pantorans have turned global politics and debate into an art form in the spirit of democracy.

  Bitter and heated arguments rage across Pantoran society regarding the fate of their homeworld. When the Republic fell
  and the Galactic Empire ascended, Pantorans became deeply uncertain about their relationship with the galaxy. In both
  their democratic Assembly and public squares, three different camps have formed regarding Pantora's political future.
  One camp—the appeasers—considers integration with the Empire a pragmatic goal. With the Empire's recognition, Pantora
  would gain security both militarily and economically. Another camp insists on maintaining the ideals of the Republic.
  These traditionalists, or republicans, consider the Empire a betrayer of those ideals, although many also believe that
  the Rebels cannot truly restore the Republic. A growing few believe that Pantora needs to strike out on its own, to
  found new colonies and exploit new resources. These expansionists believe that they need to forge treaties witht eh
  nearby slavers and spice traders, but enough Pantorans see that direction as abhorrent and any such bill dies on the
  Assembly floor.

  **Homeworld:** The far Outer Rim wold of Pantora, a moon of the ice world Orto Plutonia, is located halfway between
  Suarbi and Alzoc in the Sujimis sector. Surrounded by slavers and spice traders, Pantorans consider themselves the
  last holdover of the Republic, compolete with a democratic Assembly. The Assembly's highest exectutive position is
  that of the Chairman. Second in leadership and head of the legislative branch is the Speaker of the Assembly, who
  keeps the Chairman's power in check.

  Somewhat isolated from the rest of the galaxy, Pantora doesn't suffer direct oppression from the Empire, but the loss
  of the Republic has meant the loss of resources and money from the Senate. Pantora has been alone for the past two
  decades, struggling against the lawlessness of its neighboring systems. As a result, it has slowly built up a small
  navy of patriots and volunteers. The Assembly fears that making the navy any larger, though, might attract the
  attention of the Empire.

  Individual mmbers of the Assembly have made their own undocumented deals with other planets for resourece, technology,
  information, and even mercenaries. The Assembly turns a blind eye as long as the deals don't threaten the security of
  Pantora or its citizens. As time goes on, however, the likelihood of an invident forcing Pantora to exercise to
  sovereignty increases. Most Pantorans hope for this to occur later rather than sooner, especially as the Galactic
  Civil War rages on without a clear winner.

  **Language:** Another vestige of Pantoran feudal cultre is found in the various dialects of its language. Each dialect
  is distinct enough that communication, though possible, is difficult. For this reason, when the Pantorans originally
  joined the Galactic Senate, they adopted Basic as their official global language, and now Basic is the first language
  of most Pantoran children. The homeworld's education continues to emphasize a Republic-inspired curriculum, so
  Pantoran and its various dialects are slowly becoming unfashionable. Nevertheless, distinct Pantoran accents still
  permeate their spoken Basic. In additon, some Pantorans encourage private language education. Most end up learning a
  practical trade language, such as Huttese.
