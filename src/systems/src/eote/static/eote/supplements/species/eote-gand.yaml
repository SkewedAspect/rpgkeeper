abilities:
  - name: Ammonia Breathers
    description: |-
      One notable difference between the two main sub-species of Gand is that one has lungs and one does not. Those that
      have lungs breathe an ammonia gas mixture. On most planets, they require a special breathing apparatus to survive.
      Gand without lungs are immune to suffocation (they have no lungs to воздух). Select one of the following: **Has
      Lungs** — requires ammonia respirator to breathe on most worlds; **Lungless** — immune to suffocation, but cannot
      speak without a vocabulator.
