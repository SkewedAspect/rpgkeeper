id: eote-gran
name: Gran
description: |-
  The humanoid, three-eyed Gran are a familiar sight throughout the galaxy. Frequenting trade routes and spaceports,
  traveling in groups as merchants or tourists, the Gran seem to be everywhere. While they can hold their own if forced
  to fight, these self-proclaimed pacifists are natural talkers. Whether Gran are friendly and open or cunning and
  manipulative, they boast well-honed social skills. They have a knack for learning information that their source does
  not mean to give. At some point, most travelers have been the victim of a Gran's friendly barrage of questioning.

  The Gran have a strong community spirit and work cooperatively for the good of all. They have evolved from peaceful
  herbivores; on their homeworld of Kinyen they were once the hunted rather than hunter, living in large groups for
  protection. However, the Gran have adapted since they took to the stars, sometimes even becoming hunters themselves,
  taking work as hired guns or bounty hunters.

  There are colonies of Gran in many different sectors, as the species has dispersed throughout the galaxy quickly and
  enthusiastically. The most significant of their colonies are those on Hok and Malastare, where the local Gran regard
  themselves as natives. The Gran of these colonies have developed different social codes and practices to those still
  on Kinyen, who consider them only genetically similar. Colonies of Gran away from their homeworld are unlikely to
  remain a microcosm of Kinyen for long, even if they begin that way.

  **Physiology:** The Gran have a keen sense of sight and can see beyond the spectrum of most sighted species, including
  infrared. They can also detect minute physiological changes among their own kind that reveal emotions. Gran have two
  stomachs and digest food slowly, allowing them to go without eating for days if need be.

  **Society:** As a species, Gran are socialists and staunch pacifists, but not all individual Gran practice what their
  society preaches. Gran have a strong sense of community, and on Kinyen they raise their children for specific careers
  in order to benefit the community as a whole. This means that while the Gran are not unintelligent, their education
  can be somewhat limited. The Gran once lived in herds, relying on their numbers for safety. Now, Gran depend on their
  kin emotionally and hate solitude. In fact, loneliness can drive them insane, often criminally so. The harshest
  punishment for a Gran is exile, since having to leave his family and friends forever is a fate worse than death.

  While most Gran accept the practicalities of their educational system, there are always exceptions. The occasional
  Gran may find the structure too rigid, and want to leave the planet to do something other than the role assigned to
  him.

  **Homeworld:** The Gran homeworld of Kinyen is in the Expansion Region. It is located on the Corellian Trade Spine,
  which is one reason the Gran have spread so far through the galaxy. Many Gran still live in the colorful cities of
  their homeworld, which delight their keen sense of sight. The planet boasts lush forests as well as large plains of
  goatgrass, a favorite food of the Gran.

  For some Gran, Malastare is their homeworld and their origins on Kinyen merely history. A center of trade and
  podracing, this high-gravity planet owes its diversity to the influx of species, sentient and otherwise, arriving via
  the Hydian Way.

  **Language:** All Gran speak Gran and almost certainly Basic, since they love to talk to everyone. When necessary,
  Gran learn the languages of other species too, rather than miss any chances of conversation.
