specialAbilities: |-
  Hutts begin the game with one rank in the Enduring talent and one rank in the Nobody's Fool talent. Hutts begin
  the game with one rank in Coercion or Discipline. They still may not train Coercion or Discipline above rank 2
  during character creation.
