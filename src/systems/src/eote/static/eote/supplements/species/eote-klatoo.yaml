specialAbilities: |-
  Klatooinians begin the game with one rank in either Brawl or Ranged (Heavy) or Ranged (Light). In addition, a
  Klatooinian starts the game with one additional rank of one non-career skill of his choice. He may not train any of
  these skills above rank 2 during character creation.
