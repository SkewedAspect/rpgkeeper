  agility: 2
  intellect: 3
  cunning: 1
  willpower: 2
  presence: 2
woundThreshold: 10
strainThreshold: 8
startingXP: 80
abilities:
  - name: Methane Breather
    description: |-
      Skakoans require methane to live, and wear special pressure suits to emulate the conditions on Skako. They start
      the game with a specialised pressure suit with methane respirator, which counts as armor with indefinite supplies
      of methane. The suit has +2 soak, encumbrance of 3, 3 hard points, cannot be acquired unless on Skako (at a price
      equivalent to laminate armor), and cannot be worn by other species. Skakoans treat standard planetary air pressure
      and composition as a corrosive atmosphere with rating 6.
