id: eote-aqua
name: Aqualish
description: |-
  The Aqualish are a triad of semi-aquatic sub-species evolved from aquatic mammals on the planet Ando. Considered one
  of the most aggressive and contentious species in the galaxy, the Aqualish have found themselves at the center of
  galactic division and discord since their first contact with other species.

  The three sub-species diverged in their evolution thousands of years ago, resulting in three related races sharing the
  single water planet. All three sub-species appear similar, featuring two enormous downward-thrusting tusks, a skin
  color ranging from green to blue, and fringes of wiry hair along their jawlines and the backs of their heads. However,
  there are also considerable differences that figure prominently in how each sub-species is perceived offworld.

  The Aquala, or "finned Aqualish," form the majority on their homeworld and are the least adapted to life outside of
  their home oceans. They still possess fins rather than hands with prehensile fingers. The Ualaq have evolved
  five-fingered hands, but are the only sub-species that retained a second set of eyes, the better to see within the
  darkness of deep caves and dark forests, their chosen habitats. The Quara are the most humanoid in appearance, having
  five-fingered hands and only two eyes.

  All three varieties of Aqualish are violent and warlike, quick to take offense and slow to forgive the slightest
  insult. The history of the Aqualish is rife with wars and conflicts, from early struggles amongst themselves to their
  legendary first contact with an alien species.

  **Physiology:** Each of the three sub-species of the Aqualish stands roughly a meter and a half tall. All three
  possess bulky bodies, with the Aquala's being further distended with a healthy layer of insulating fat. However, most
  Aquala spend their entire lives on Ando, seldom if ever leaving their homeworld.

  Both the Ualaq and the Quara are far more likely to be seen off-world, since their hands are better suited to using
  the technology of other species. The Quara have a reputation for being thugs and criminals, while most of the Ualaq
  have moved offworld to avoid persecution by the Aquala.

  The facial features of all three Aqualish sub-species combine elements of arachnid and aquatic mammal evolution. The
  placement of their tusks is often reminiscent to most sentients of the mandibles of a giant spider, aggravated by the
  thick fringe of wiry brown or black hair and their black, pupil-less eyes. The skin's rubbery consistency and rough
  texture, meanwhile, recall the hides of a variety of aquatic mammals. Because of the close placement of their two sets
  of eyes, the Ualaq are the most arachnid in appearance.

  **Society:** The three sub-species of the Aqualish have a long history of antagonism towards each other. Once they
  secured hyperdrive technology, combat amongst them nearly ceased as they extended their violent tendencies to their
  galactic neighbors.

  The Aquala are by far the most numerous of the sub-species on Ando. The Quara are the least numerous and most
  aggressive. In fact, more Quara live elsewhere in the galaxy than on their homeworld. The Aquala blame the Quara for
  the Aqualish's galactic reputation as thugs and persecute them mercilessly, contributing to the cycle of Quara
  emigration.

  All Aqualish culture is centered on belligerence and strength, and violent physical confrontations are common in
  almost all forms of interaction. Because of this focus on brutality and conflict, the subtlety and restraint required
  in negotiation are not among their most common attributes, making it hard for any outsider to interact with them
  diplomatically.

  The Aqualish are not adept at designing and developing technology and instead tend to slap together bits and pieces of
  other species' equipment in a less-than-efficient manner. Because of this, the Aqualish are often seen as scavengers,
  adding to their unsavory reputation throughout the galaxy.

  Due to their innate aggression, most individuals from all three Aqualish sub-species are natural bullies, tending to
  challenge any new acquaintance with confrontational behavior meant to test their strength and resolve. Any perceived
  weakness is met with continued persecution.

  **Homeworld:** The Aqualish sub-species hail from the aquatic world Ando, located in the Lambda sector in the galactic
  south-east along the Corellian Run. The planet is almost entirely covered in oceans, with what little dry land there
  is given over to swamps, rain forests, and rocky projections featuring deep, wet caves. These small land masses are
  generally shrouded in steam and fog all year long.

  Ando's capital city, Quantill City, mirrors the division of the planet and indeed the species as a whole. The city is
  divided into Aquala and Quara districts, while the Ualaq are nearly unrepresented. Quantill City is home to the
  planet's primary spaceport as well as the Imperial legation.

  **Language:** All three Aqualish sub-species speak similar dialects of the language that scholars know simply as
  Aqualish. However, it is nearly impossible for other sentients to speak this language due to the Aqua lish's massive
  tusks, and thus most off-world Aqualish are fluent in Galactic Basic as well.

  Due to the construction of Aqualish vocal cords and the limitations imposed by their over-hanging tusks. it is
  impossible for Aqualish to speak in Basic without it sounding abrasive and harsh. This only serves to further the
  perception of the Aqualish as brutish louts.
