abilities:
  - name: Sub-Species Options
    description: |-
      A player choosing to play an Aqualish character must choose one of the following sub-species. No matter which
      subspecies is chosen, no skills may be trained above rank 2 during character creation.


      **Aquala:** Aquala begin the game with one rank in Resilience. Furthermore, Aquala may remove <setback/> imposed
      due to any cold or wet conditions.


      **Ualaq:** Ualaq begin the game with one rank in Survival or one rank in Perception. Furthermore, Ualaq may remove
      <setback/> imposed due to dark conditions, but suffer <setback/> to Perception checks in brightly lit
      environments.


      **Quara:** Quara begin the game with one rank in Athletics or one rank in Coercion. Furthermore, Quara may remove
      <setback/> when attempting to track anything through a natural environment.
