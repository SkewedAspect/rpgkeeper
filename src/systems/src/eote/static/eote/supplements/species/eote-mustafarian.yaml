id: eote-mustafarian
name: Mustafarian
description: |-
  The perpetually volcanic, burning world of Mustafar seems an unlikely place for anything to thrive, let alone a
  sentient species. Mustafar once teemed with life, like so many terrestrial worlds, until the planet's orbit changed
  dramatically. Ancient legends claim a mythical, ruinous weapon shifted the orbit of the nearby gas giant Lefrani. This
  epic cataclysm sent Mustafar into an unusual and gravitationally crushing alignment between Lefrani and another nearby
  gas giant, Jestelad. Very few species survived the resulting volcanic cataclysm. Force to areas in the north and near
  the equatorial regions of the world, the remaining Mustafarians adapted and evolved to their new realities. The
  northern Mustafarians bcame tall and thin, while those near the equator became shorter, but stronger and stouter. Of
  course, these ancient tales can hardly be confirmed with any certainty; what is clear is that Mustafar is an extreme
  environment, and the species that shares its name with the world has adapted to its harsh climes.

  The Mustafarians themselves aren't overly aggresive, so instead of allowing pointless tribalism to rule the tw

  o groups usually work together to harvest their world's meager resources. Development picked up as off-worlders took a
  greater interest in the world's particular commodities. The Mustafarians grealy benefited from the introduction of
  higher technology. Mustafarians seem to have a natural affinity for technology, and they strive to advance it to help
  them survive more easily. No matter how dureable imported technology seems to be, Mustafarians have learned from
  tragic experience  never to really trust it until they have a chance to modify and further harden it against the blast
  furnace that is their harsh environment.

  Though infighting between Mustafarian groups is uncommon, highly aggressive creatures are a great hazard on the world,
  thanks to competition over scarce resources. As they and most of Mustafar's native creatures are highly resistant to
  heat, the Mustafarians sentries and combatants refularly wield their specialized gear, whether working the mines or
  patrolling on their massive lava fleas. Even Mustafarian melee weapons are heavier and more durable compared to their
  off-world counterparts.

  **Physiology:** The two kinds of Mustafarians are genetically similar, but have developed differently over the
  innumerable generations since the ancient cataclysm. The taller norther Mustafarians are more vulnerable to damage.
  Thus, stouter southern Mustafarians more often take on the harsher work, such as labouring in the Mining Guild's lava
  extraction operations.

  Mustafarians are arthropods, with  a tough exoskeleton over leathery skin. They are bipedal and somewhat humanoid.
  They have long snouts and large eyes on either side of their heads. Even unprotected, Mustafarians can naturally
  withstand far more heat than most species. Though many of their adaptations came about to help them survive the heat,
  Mustafarians still wear armor and heavy environmental protection gear when outside of their underground shelters. They
  have a limited capability to survive on the surface without survival gear, but rarely put this durability to the test.

  Workers and travelers who spend extended amounts of time outside typicaly wear breath masks to further protect
  themselves from the noxious fumes that can sometimes flood the surface due to the sudden eruptions or shifts in the
  blasting wind. A significant percentage of the population opts to install cybernetics to aid in certain tasks and
  improve their likeliehood of surivial. Such enhancements are helpful but not usually extravagant. They tend to
  complemetn the Mustafarians' natural abilities, rather than replace them wholesale. However, severely injured
  Mustafarians who require replacement limbs or organs often have no qualms about gaining an advantage from their
  otherwise unfortunate situation. They are only limited by what they can afford, which can be a significant hindrance.

  **Society:** Living on a world that demands so much effort just to stay alive has made the Mustafarians insular and
  disinterested in galactic affairs. Their focus on advancement and survival of their species overrides other concerns,
  and many regard off-worlders with little curiosity. They are politically organized in accordance with the caverns and
  communities they inhabit. While the two subspecies live together as needed, the geographical distance and limited
  desireable living space tends to keep them in their own communites. There is little in the way of central government,
  but some of the more trusted leaders are allowed to cut deals with off-worlders. THese deals alsmost always help
  ensure Mustafarian survival and quality of life.

  Such thinking led them to fall under the sway of the Techno Union before and during the Clone Wars. After the
  Seperatist defeat and the rise of the Empire, the Mining Guild took over much of the heavy industry and lava skimming
  that the Techno Union had started. So long as it helps their cause, Mustafarians are generally willing to tolerate a
  degree of outside political interference.

  **Homeworld:** Mustafar is a hot, volcanic planet with constant eruptions and massive rivers of lava that cut across
  the landscape. The Mustafarians find relief and shelter in natural caverns and abandoned mines. They build outdoor
  structures when necessary such as the suacer-shaped buildings at and near active mining sites. Mustafarian structures
  are strongly reinforced and armored against natural calamities, making the larger facilities on Mustafar decidedly
  fortresslike in construction and durability.

  There is comparitively little life on Mustafar's surface, and not much more underground. The northern Mustafarians use
  large insect creatures called lava fleas to move rapidly on the surface in great leaps and bounds. Underground,
  Mustafarians hunt strong hardshelled, burrowing quadruped creatures called krishels through labyrinths of seemingly
  never-ending caverns and tunnels. Mustafarians cultivate few crops, lacking the water to support traditional farms
  even underground. Various types of edible fungi and domesticated herds of large insectoid creatures make up much of
  the Mustafarian diet. Despite these challenges, Mustafar is largely self-sufficient in regards to its food supply,
  unlike many other hotbeds of industry across the galaxy.

  **Language:** Mustafarians have their own language, which has developed very precise ways to express concepts relating
  to the natural features above and below ground, especially those phenomena that are deceptively dangerous. The
  Mustafarian subspecies have different dialects, but though some terms and cultural concepts also differ, any two
  individuals can communicate on a functional level.

  Mustafarians are capable of speaking Basic and other common galactic languages, but other than the ones who work in
  the Mining Guild operations and deal with outsiders by necessity, most do not bother to learn Basic. Mustafarians who
  live or travel off-world almost always speak Basic and sometimes the language of ther trading partners. Given their
  history with the Techno Union, they are more likely to know languages regularly used among the former Seperatist
  Worlds.

  **Life on the Fringe:**Most Mustafarians' lack of interest in the galaxy means they are disinclined to leave their
  homeworld. Business pursuits and trade negotiationsdo drive some Mustafarians to leave their world. Mustafarians
  merchants and Mining Guild personnel make regular trips to trade for upgrades in protective technology and equipment,
  as well as to deliver ore to buyers.

  Some Mustafarians seek full-time employment off-world in the ranks of corporations, criminal syndicates, and trade
  rings. Given their cultural focus on survival against a harsh universe, many Mustarians have few qualms taking on work
  that most members of many other species would find overly risky, unethical, or unfathomably boring. Mustafarians find
  most inhabited worlds cold, but relish the relish the relative safety.
