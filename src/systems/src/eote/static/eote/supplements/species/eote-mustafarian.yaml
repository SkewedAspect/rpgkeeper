    description: |-
      A player choosing to play a Mustafarian character must choose one of the following subspecies.


      **Northern Mustafarian:** Northern Mustafarians may remove <setback/><setback/> from checks to resist arid or
      hot environmental conditions. Additionally, they begin play with one rank in the Eye for Detail talent.


      **Southern Mustafarian:** Southern Mustafarians may remove <setback/><setback/> from checks to resist arid or
      hot environmental conditions. Additionally, they begin play with one rank of the Enduring talent.
