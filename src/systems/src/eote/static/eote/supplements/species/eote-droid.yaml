specialAbilities: |-
  Droids do not need to eat, sleep, or breathe, and are unaffected by toxins and poisons. Droids have a cybernetic
  implant cap of 6 instead of their Brawn rating. Droids cannot become Force sensitive, do not gain a free rank in
  each of their career skills, and are not affected by mind-altering Force powers. Droids may train one additional
  career skill and one additional specialization skill. They also start with one rank in the Enduring talent.
