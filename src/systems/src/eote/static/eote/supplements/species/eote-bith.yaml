abilities:
  - name: Sensitive Hearing
    description: |-
      Bith add <boost/> whenever they make a hearing-based Perception check. When Bith suffer strain due to loud noises
      (such as from sonic weapons), they suffer twice the normal amount of strain. Wearing ear protection negates both
      effects of this ability.
