id: eote-lngrngscnr
name: Long Range Terrain Scanner
description: |-
  A variation on CryonCorp's successful EnhanceScan personal-scanner line of products, the Long-Range Terrain Scanner
  was developed with the professional explorer in mind. The LRTS uses a limited-power ground-following radar of the kind
  typically found on military airspeeders for low-level instrument flying. Typically mounted to slow-flying airspeeders
  or small landspeeders with a reasonably high maximum altitude, the LRTS allows a scouting team to make a comprehensive
  topographical map of a new planet quickly and efficiently. The radar transceiver is mated to a broadband sensor suite
  and mapping program that takes in billions of bits of data per second. In game terms, the LRTS has a range of long and
  can map quite a large area of ground in a single pass. Depending on the atmospheric conditions, the size of the area
  being mapped, and numerous other variables, the time required to thoroughly map an area can take from a few hours to a
  few days of concentrated effort.

  Successfully using the LRTS requires an **Average (<difficulty></difficulty><difficulty></difficulty>) Computers
  check** on the part of the operator. Maps produced with the LRTS add <boost></boost> to any Survival check made to
  navigate using the map plus an automatic <success></success> for every two <advantage></advantage> gained on the
  Computers check.
encumbrance: 6
rarity: 6
reference:
