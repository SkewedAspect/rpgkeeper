id: eote-verpbondgaunt
name: Verpine Bond Gauntlets
description: >-
  Bond gauntlets are a Verpine invention designed to strengthen and reinforce an individual’s forearms, while providing
  stabilization to hand and arm movements. They are composed of a thin, flexible material that resembles the carahide
  exoskeleton of a Verpine, which extends from the top of the hands to the elbow. When an electric current is passed
  through the gauntlets, the material grows exceptionally rigid and supportive.

  Due to this additional stability, Verpine bond gauntlets grant their users a <boost></boost> to checks made to handle
  volatile materials or perform delicate work. Such circumstances should be adjudicated by the CM on a case-by-case
  basis, and may include Computers and Mechanics checks to make delicate repairs and Skulduggery checks to pick locks or
  disable traps.
encumbrance: 1
rarity: 6
reference:
  - SoR:115
