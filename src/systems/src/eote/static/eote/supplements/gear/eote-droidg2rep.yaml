id: eote-droidg2rep
name: G2 Repair Droid
description: |-
  SoroSuub G2 Repair Droid
      
  The G2 repair droid is a custom Sullustan design produced by SoroSuub. Intended to assist with shipboard repair, many
  of these droids instead found themselves utilized as pilots and tour guides for civilian charter vessels. Referred to
  as “goose droids” due to their widely spaced feet, long necks, and clumsy gait, G2s tend to possess a quirky demeanor
  and exhibit excessively chatty behavior. Over time, the droids also develop a unique sense of humor, trading
  witticisms and bad jokes with anyone who takes the time to listen.

  Overall, the G2 series droids were appreciated by their owners and the tourists they were charged with. Many G2 owners
  would relieve their droids of their jobs and keep them around as companions. The series’s downfall, however, lay in
  the fact that larger corporations considered them a waste of money due to their tendency to talk rather than work.
encumbrance: 0
rarity: 5
