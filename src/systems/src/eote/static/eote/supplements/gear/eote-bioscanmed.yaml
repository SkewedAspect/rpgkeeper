id: eote-bioscanmed
name: Bioscan (Medical)
description: >-
  A healer must be able to recognize any anomalies in a patient's biological makeup in order to properly cure an injury.
  A bioscan is capable of identifying an individual's species, age, and condition based upon a given set of parameters.
  It can also recognize any disruptions to the anatomy from injuries or diseases, as well as deliberate modifications
  such as cybernetics and cosmetic modification.

  A character using a bioscan can remove <setback></setback><setback></setback> from any Medicine checks the character
  makes.
encumbrance: 1
rarity: 2
reference:
  - DoH:50
