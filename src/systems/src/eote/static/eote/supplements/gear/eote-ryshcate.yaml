id: eote-ryshcate
name: Ryshcate (Cake)
description: A sweet, cake-like pastry, ryshcate is eaten by Corellians to mark holidays and special occasions. Made
  with Corellian whiskey and vweilu nuts, ryshcate has a very distinctive flavor that tends to conjure up memories of
  their homeworld and childhood for Corellian expatriates elsewhere in the galaxy. Due to the alcohol used in baking it,
  ryshcate cakes can be preserved and remain edible for years or even decades.
encumbrance: 0
rarity: 2
reference:
  - SoF:103
