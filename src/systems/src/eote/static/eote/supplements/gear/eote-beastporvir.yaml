id: eote-beastporvir
name: Porvir
description: |-
  Porvir are tiny, awkward creatures. More than half of their bodies are taken up by  a bulbous rear, in which they
  store water and fat for the lean winter months. Their stubby legs move them at a slow waddle, and their poor vision
  means that they rarely find food quickly or easily, and often creatures leave behind. Despeite all these
  disadvantages, porvir thrive across nearly every world on which they c an be found, regardless of the predatory
  species present—thanks to a natural affinity for the Force.

  Provir have the innate ability to discourage hostile attention by using the Force in a way similar to the mind tricks
  that Force users sometimes emply to persuade the weak willed. While sentient beings usually have the mental fortitude
  to harm or capture porvir if they try, most other animals simply ignore the creatures as if they were not present, or
  at least  inedible. Given this unusual power, most porvir travel their habitats without any sign of fear which can
  make  them either unpleasant pests or easily befriended pets depending on the circumstances at hand.
encumbrance: 0
rarity: 5
