id: eote-cyadrenal
name: Adrenal Implant
description: >-
  A small implant affixed to the suprarenal glands, an adrenal implant stimulates the production of epinephrine in the
  body when the individual's nervous system is subjected to strain. While the implant's stimulation is not as rapid as a
  direct injection of epinephrine into the bloodstream, it does reduce recovery time from fatigue.

  An adrenal implant provides 1 rank of the Rapid Recovery talent.

  **Models Include:** Athakam MedTech A.9a Adrenal Stimulator, BioTech Industries.]
encumbrance: 0
rarity: 5
reference:
  - LoNH:106
