id: eote-sigscent
name: Signature Scent Synthesizer
description: |-
  Aromas have a tremendous potential to influence a subject's reaction. A pleasing smell can leave a person in a more
  receptive mood, while an unpleasant one may cut a discussion short. However, a smell that is enjoyable to one culture
  can be nauseating to another. In fact, some species find the natural body odors of other species to be overpoweringly
  noxious. Strong odors that can conceal unpleasant ones are often a necessity.

  A signature scent synthesizer creates millions of different aromatic compounds. These can be customized to complement
  the olfactory organs of most common species and many lesser-known ones. The system has a catalog that details the
  common emotional responses to many scents, which are further categorized by species and culture.

  Using a signature scent synthesizer prior to a discussion removes <setback></setback><setback></setback> from the
  first Charm, Coercion, or Negotiation check made during the encounter.
encumbrance: 1
rarity: 0
reference:
  - DoH:48
