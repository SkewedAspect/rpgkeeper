id: eote-beastkaadu
name: Kaadu Riding Beast
description: Sometimes compared to the Cracian thumper or kybuck, kaadu are swift bipedal duck-billed reptavians native
  to the swamps of Naboo. As with the fambaa, Gungans have expertly trained these amphibious beasts for use in a variety
  of ways in their society. Gungan warriors often take kaadu for reliable mounts, developing a close personal bond with
  their beasts. As with the fambaa, the kaadu saw action in the Battle of Naboo in 32 BBY. Unlike fambaa, however,
  Gungans are quite possessive of kaadu. Asa result, these creatures are not traded as often as other beasts they train.
encumbrance: 0
rarity: 7
reference:
  - SoT:86
