id: eote-dtsdismantler
name: DTS-series Dismantler Droid
description: |-
  Industrial Automaton's DTS-series dismantler droids are a common sight in the galaxy's ports and breaking yards.
  Dismantlers are big, surprisingly numble droids roughly the size of a small starfighter or large airspeeder. They are
  shaped somewhat like a mushroom, with a large sensor-studded dome of a head perched on a thin cylindrical body. Four
  insect-like legs surround the base of the body, and two massive arms tipped with powerful crushing claws sprout from
  beneath the head. Designed to dismantle and recycle starships, these burly droids are equipped with a suite of
  destructive tools and weapons, backed with the strength to use them. To get around shipyards quickly, dismantlers are
  also equipped with a repulsorlift generator and numerous small thrusters that give them a surprising turn of speed.

  While they are intelligent, they are remarkable single-minded and rarely interact with organic sentient beings other
  than to take orders, report, and ask for clarifications. This gives them a reputation as slow-witted and dull, which
  makes individuals unfamiliar with these droids tend to underestimate them.
encumbrance: 0
rarity: 6
reference:
  - DoR:119
