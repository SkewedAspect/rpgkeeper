id: eote-alchemyshieldamulet
name: Shield Amulet
description: >-
  This small, seemingly decorative item protects the wearer from attacks that call on the Force for power. Such attacks
  break like waves against the rocks from the amulet's power.

  If the user would suffer damage from an attack where a Force power was used either to perform the attack or augment
  its effects, they may choose to reduce the damage the attack inflicts by half (rounded up). This talisman can only be
  used once per session.
encumbrance: 0
rarity: 8
reference:
  - UP:84
