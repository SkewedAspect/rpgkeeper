id: eote-talisgrimsyc
name: Grimoire of Syclos the Lame
description: >-
  Whereas most citizens of other planets may believe the Force to be but a legend, on the Wild Space planet of Weik, the
  Force is known to exist without a doubt. Equally feared and celebrated, it is utilized by many of the world’s
  residents on a daily basis. It is not, however, understood in the manner propagated by the Jedi, or even the Sith.
  Instead, on Weik, the Force is viewed as magic.

  Over the centuries since the unique culture of Weik arose in the wake of a crash landing, all the trappings and
  mysteries associated with fantasy holodramas and children’s tales have found real-world analogs on the planet.
  Ignorant of how the wider galaxy sees such things, the people of Weik are familiar with what they consider to be
  “magical’’ weapons and armor, ensorcelled objects of power ranging from clothing to tools, and even, as in the case of
  the legendary Grimoire of Syclos the Lame, spellbooks.

  Befitting its portentous name, the Grimoire is a large, leather-bound book, its cover tooled with mystic patterns,
  reinforced with bronze bosses, and liberally decorated with darkly sparkling gemstones. Central to the cover design is
  a glyph of power that only offplanet observers might recognize as a stylized, winged lightsaber. Of greater interest
  to most students of the Force, however, is the book’s contents.

  Hand sewn into a cloth binding, some eight dozen gathers of parchment form 386 closely lined pages. The source of the
  parchment is a minor mystery among the many that surround the Grimoire. Though the Grimoire was clearly prepared in
  the manner traditional on Weik—from animal skins flayed, soaked, and stretched on frames—the green-gray color of its
  pages suggests that the skins used were not those of any animal known to the planet. Neither is the luminous ink used
  in scribing the pages of a formula replicated in any other known Weik-produced book, whether “magical” or not.

  The effect of the glowing amber ink against the background of gray and green would have offered a challenging reading
  experience even if Syclos the Lame—if she was in fact the scribe—had been an accomplished calligrapher. Unfortunately,
  whoever penned what have been called the book’s “mad ravings” was far more concerned with utilizing every square
  centimeter of available space than with legibility. It has been estimated that the Grimoire of Syclos the Lame
  contains more than a half-million individual words, whereas books of similar provenance and size usually contain
  around two hundred thousand, even when they are not so liberally embellished as the Grimoire.

  It is those embellishments—or rather, their many reproductions—that have given this tome its fame on Weik. Taking the
  form of creatures out of nightmare, the capital letters heading each page are hollow-eyed, many-limbed monsters,
  rendered in glowing ink that seems to cause them to move on the page. No figure is repeated across the Grimoire’s
  pages, yielding a fiendish menagerie of beasts that would give pause even to far-traveled big game hunters of the
  wider galaxy. The Beasts of Syclos, as they are popularly known, may be found copied in many other volumes, and they
  have even been rendered in stone as rain-spouting gargoyles on Weik’s cathedrals and castles. Large mock versions of
  the creatures crafted from paper and daub are carried aloft on wooden poles through Weik’s villages. This occurs at
  sunset on the autumnal equinox, in a celebration known as the Feast of Worms.

  But for all its local fame, the Grimoire has been little studied by the sages of Weik. The peculiarities of its
  production and the nigh-indecipherable scrawl of its scribing would be daunting enough, but Weik is a place where
  legends are given great credence, and according to legend, to read the

  words of Syclos the Lame is to invite madness. The secrets it unlocks are said to be sorely tempting for the power
  they offer, but the ultimate promise of the lame wizard’s teachings is death. The Grimoire’s information is said to be
  applicable to beasts across the galaxy, not just those located on Weik.

  Studying the Grimoire of Syclos the Lame for at least one hour allows a Force-sensitive character to add [FO] to all
  Force power checks or checks involving Force talents when dealing with creatures detailed in the Grimoire. The bonus
  lasts until the end of the game session. (What creatures the bonus applies to is ultimately up to the GM, as some
  creatures may not be covered in the Grimoire.)

  However, until the end of the game session, the difficulty of all fear checks made while confronting these creatures
  is upgraded twice. Any Conflict generated by a <despair></despair>  result on a fear check is doubled.
encumbrance: 0
rarity: 10
reference:
