id: eote-droidts
name: TS-Series Interrogation Droid
description: |-
  TS-series Interrogation Droid

  The construction and use of interrogation droids is looked down upon in the more civilized areas of the galaxy. That
  being said, the widespread ethical concerns surrounding these frightening droids has never stopped droid manufacturers
  from building them, nor has it stopped government agencies and criminal enterprises from purchasing as many as they
  can. For the main branches of Imperial Military Intelligence, Arakyd Industries has been the provider of choice for
  droids. The notorious and frightening IT-O series started out as an Arakyd design before being retooled by the
  Department of Military Research, and Arakyd's Viper probe droid is also a common Imperial Navy standby. Arakyd's new
  TS-series interrogation droids are the latest addition to the Empire's roster.

  Marketed as "medical droids," TS-series droids are small, inhuman-looking constructs just over two meters tall. They
  have a thin, flat, curving torso similar to a droideka's and two long, spindly arms equipped with a frightening array
  of blades, injectors, cutting lasers, and other vicious-looking medical apparatus. Their flat, cowled head sports four
  bright-red photoreceptors all in a horizontal line. The base of their body is a flattened triangle that acts as a
  counter-weight and the hub of a low-profile, solid rubber wheel used for locomotion. While they can talk, and are
  often effusive when reporting information or discussing interrogation techniques with their handlers or other droids,
  TS-series interrogators are relatively quiet when performing actual interrogations. They tend to ask simple,
  uncomplicated questions in a straightforward and often cheerful manner, apply pain as needed, and repeat the sequence
  until they get the information they require.

  Very few of these ghastly droids exist currently, and all of them are in service with the Imperial Military
  Intelligence services. Word of their introduction has recently begun circulating throughout the Alliance, primarily
  from Rebel moles within the ISB. The rumors of the TS-series' capabilities grow more and more outrageous with every
  telling, and there is currently a large reward for any Rebel cell that can capture one and return it intact for study.
