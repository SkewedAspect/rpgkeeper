id: eote-beastaiwha
name: Aiwha Riding Beast
description: Thought to be native to the waters of Naboo, aiwhas are also found on Kamino, and have been imported to
  other oceanic worlds. As water-based mounts, aiwhas have unique physiological adaptations that allow these
  air-breathing cetaceans to take flight for brief distances in the open air. While not truly domesticated creatures,
  they are friendly and are often trained as mounts amongst amphibious species.
encumbrance: 0
rarity: 8
