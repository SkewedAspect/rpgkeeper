id: eote-cybercavity
name: Cybernetic Cavity
description: >-
  Some smugglers go to great lengths to conceal valuable cargo, including hiding it in their own bodies. While smuggling
  goods and spice strapped to the body or swallowed for later retrieval is not uncommon, some smugglers have found it
  expeditious to move goods inside small containers surgically implanted into their bodies or even incorporated into
  cybernetic limbs. While a full body search or holoscan might reveal the presence of a cybernetic cavity, it is
  practically unnoticeable on casual inspection and is likely to be missed by many scanners.

  A cybernetic cavity provides 1 rank of the Hidden Storage talent (see page 137 of the **Edge of the Empire** Core
  Rulebook). A character with this cybernetic can use the Hidden Storage talent to conceal items within his own body.

  **Models Include:** Various models.
encumbrance: 0
rarity: 3
reference:
  - FC:48
