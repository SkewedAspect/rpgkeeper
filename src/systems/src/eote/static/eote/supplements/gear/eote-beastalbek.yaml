id: eote-beastalbek
name: Albek
description: >-
  The spine-backed, reptilian albeks have spread to numerous worlds across the galaxy, in large part due to a single
  trait of the species—its complete and utter fearlessness. Though averaging less than a meter in length, albeks are
  stubborn and aggressive. They have been known to take the intrusion of starship or speeder into their territory as a
  challenge and often stow away aboard the offending vessel. Once in place, they can be quite difficult to remove as the
  small creatures have a fierce temper and a unique ability to anticipate blows or grabbing hands with the Force.
  Pinning down albeks that don;t want to be caught is all but impossible, and usually only makes them more determined to
  stay where they are.

  Some animal trainers have learned to use this stubborn attidude to train the creatures. Getting the beasts to do
  anything they don;t want to do is all but fultile, but since albeks accpet gifts of food greedily, getting them to do
  what the trainer wants is simply a matter of getting one to recognize the trainer's value as a provider of treats.
  Well-fed and placated albeks make for ferocious and territorial guard animals, and ones that are not likely to draw as
  much attention as larger and more obviously threatening beasts.
encumbrance: 0
rarity: 6
reference:
  - SS:74
