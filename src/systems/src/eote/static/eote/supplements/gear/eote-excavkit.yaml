id: eote-excavkit
name: Excavator's Precision Tool Kit
description: |-
  Galactic civilization is incredibly ancient. Sentient beings have been plying the spacelanes and settling planets for
  millennia. Cities, empires, and even entire civilizations have risen, flourished, and fallen numerous times in
  countless places in the galaxy. Occasionally, these ancient peoples left behind great works of engineering—ancient
  cities, vast orbiting shipyards, lonesome abandoned space stations, huge necropolises, and the like—but mostly they
  drove themselves into oblivion, and the only remains are shattered remnants and half-remembered stories. Throughout
  the galaxy, intrepid sentients of all species who possess a wandering spirit and a thirst for knowledge sift through
  the remains of the ancient past to both help understand where the species of the galaxy have been and where the future
  is taking them. To help these adventurous scholars with their labors, numerous precision-tool makers in the galaxy
  produce tool kits of varying size and quality that make an attempt to be both compact and all-inclusive. By far the
  most popular of these tool kits is the Excavator Precision Tool Kit from Loronar Corporation.

  Designed for and marketed to scholars, historians, and archaeologists, the PTK contains a number of well-crafted hand
  tools and essential accessories for excavation of ancient sites and general exploration. Included are a number of hand
  spades and brushes of various size, a multitool, a stout knife, a pair of spring-loaded shears for cutting roots and
  vines, metal and ferroceramic files for sharpening tools, writing utensils, sample bags of various sizes, adhesive and
  string tags for categorizing finds, measuring equipment, a small spool of monofilament, and small picks, hammers, and
  mallets of different weights and material. All of this, along with a small, slimline datapad with high-definition
  recording capabilities, is all housed in a sturdy, lockable, weatherproof carrying case.
encumbrance: 5
rarity: 7
reference:
  - EtU:52
