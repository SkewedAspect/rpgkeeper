id: eote-beastuxibeast
name: Uxibeast
description: Shaggy uxibeasts have been used as beasts of burden on planets across the galaxy for untold years. These
  docile herd beasts can carry enormous loads without any sign of discomfort, and they are extremely difficult ot spook
  or rile. Some cultures even use these horned quadrupeds as mouts, although the difficulty of spuring them past a slow,
  ambling gait limits the usefulness and popularity of this practice.
encumbrance: 0
rarity: 2
