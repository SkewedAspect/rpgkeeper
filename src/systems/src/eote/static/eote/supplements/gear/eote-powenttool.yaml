id: eote-powenttool
name: Powered Entrenching Tool
description: >-
  Essentially a small folding shovel at the end of a short plasteel haft containing a powerful pistoning mechanism, this
  tool can be used to forcefully dig holes and trenches as well as level areas for construction. The serrated blades
  cast into the sides also allow it to slice through heavy brush and obstacles. It's rare for a combat engineer not to
  possess at least one of these extremely versatile tools.

  A character using a powered entrenching tool gains automatic <success></success> on checks to build structures.
encumbrance: 5
rarity: 4
reference:
  - FO:48
