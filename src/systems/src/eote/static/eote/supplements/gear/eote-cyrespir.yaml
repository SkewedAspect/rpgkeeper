id: eote-cyrespir
name: Cybernetic Respirator
description: |-
  For those organics seeking to escape fleshly frailties, cybernetic respirators offer an alternative to lungs. These
  machines are often designed to be robust and resilient, filtering out many different toxins and allowing those
  implanted with them to survive underwater or even in a completely airless environment for a short time. Certain models
  are known for making a regular, ominous rasp while others work in deadly silence.

  A cybernetic respirator permanently provides a character with the benefits of a breath mask and respirator (see page
  179 of the **Edge of the Empire** Core Rulebook) and 1 rank of the Blooded talent.

  **Models Include:** Various.
encumbrance: 0
rarity: 4
reference:
  - LoNH:107
