id: eote-droidsdmn
name: SDMN-Series Session Droid
description: The SDMN "Side Man" series entertainment droids were designed by Cybot Galactica to be the ultimate
  entertainer's sidekick. Designed by focus group and committee, the Side Man droids are built to be as inoffensive and
  engaging as droid technology allows. They can be ordered from the factory with a number of add-ons and special
  programs tailored to their owner's particular needs, from an illusionist's assistant to a wail band's percussionist. A
  Side Man has an obsequious, eager to please personality that professional entertainers tend to find incredibly
  irritating. As such, most SDMN droids working throughout the galaxy, especially those owned by musicians, have been
  reprogrammed to be both more enjoyable to be around and better suited to operating in the often seedy, disreputable
  trenches of the galactic entertainment industry. Despite their built-in personality flaws, Side Men are quite
  competent and are in high demand by professional and aspiring entertainers.
encumbrance: 0
rarity: 5
