id: eote-a99aquabreath
name: A99 Aquata Breather
description: |-
  The aquata breather is a small device consisting of two small tanks connected to a mouthpiece. It provides its user
  with up to two hours of breathable air, and it especially useful in subaquatic environments. Most Jedi Knights who
  could not naturally breathe water took aquata breathers with them on their missions, even if they did not predict
  aquatic travel.

  While the aquata breather is an incredibly useful survival tool, it is also designed to be entirely disposable. Once
  the two hour air supply is used, it cannot be recharged.
encumbrance: 0
rarity: 7
reference:
  - KtP:52
  - RotS:59
