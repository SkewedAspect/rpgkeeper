id: eote-taliseyeslaq
name: Eyes of Laqasa
description: |-
  The Jedi Knight Laqasa Trill was a Devaronian woman and an incredibly skilled hunter, excelling at an activity more
  often practiced by Devaronian men. Trill was an exemplar of the philosophy of hunting that ecologists promote,
  carefully choosing her marks from overpopulated game species or stalking the rare rogue predators that target
  sapients. She insisted that hunting was a meditative act, and she claimed to owe her phenomenal success to the
  Force-enabled connection she shared with her quarry.

  Although she was an accomplished Jedi, Trill was careful never to use the order’s signature weapon, her lightsaber, in
  the hunt. Instead, she adopted the tools and weapons of the local hunters in whatever environment she found herself,
  thus mastering a dizzying array of techniques and technologies. She was not above modifying the accoutrements she came
  across in her travels, however, and at least one example of her tinkering is thought to have survived to the present
  day. Rumored to be stored in a hunting lodge deep in Devaron’s Blue Mountains, the Force-imbued goggles known as the
  Eyes of Laqasa miniaturize the functions of high-end electrobinoculars within a pair of crystalline lenses set into a
  leather headband. It is those crystal lenses, and the powers the Jedi invested in them, that mark the Eyes of Laqasa
  as a powerful Force artifact.

  The particular impetus for the invention of the Eyes of Laqasa is a Devaronian legend. Late in Laqasa Trill’s life, a
  male hunter secretly and illegally imported a troop of large predators that shared the characteristics of simians and
  reptiles. Their world of origin is unknown to this day, but what made the animals unique, even more than their
  viciousness, was their Force-enabled chameleon ability, a trait that had evolved in the beasts to such an extent that
  they were practically invisible in natural surroundings. The hunter released the troop into a supposedly enclosed
  hunting sanctuary, which they promptly escaped after slaying their would-be killer and his game wardens.

  For the next two years, the troop wreaked havoc on the ecosystem of Devaron’s northern continent, ranging far and wide
  and eluding the finest hunters on the planet. It was then that Laqasa Trill arrived, making one of her infrequent
  visits to her homeworld. When she learned of the situation, she vowed to end the threat posed by the alien predators
  once and for all. Taking only what she could carry on her back, the idiosyncratic huntress disappeared into the
  wilderness.

  The Jedi was never known to take trophies except for this instance. When she returned to civilization over a year
  later, she wore an ankle-length, color-shifting cloak woven from the hides of her prey. She also wore a set of goggles
  she had constructed in the course of her hunt, and she recorded in her journals that she owed not only her success to
  the Eyes, but her very life.

  When wearing the Eyes of Laqasa, Force-sensitive characters remove all <setback></setback> imposed due to darkness,
  concealment, camouflage, or similar effects, and can see normally as if in normal daylight.
