id: eote-lumaflare
name: Luma Flare
description: >-
  Luma flares are rocket propelled illumination devices commonly used by both militaries and survivalists. Luma flares
  excel at illuminating dark areas, as their detonation spreads a luminous compound over a wide blast area. They are
  also popular as signaling devices, especially when used to attract the attention of search and rescue teams.

  Each luma flare is a self contained device with limited guidance capability. The flare's simple controls allow the
  user to guide its rough trajectory, as well as to adjust the blast's detonation point based on the desired altitude. A
  safety is included, which generally precents the flare from igniting before the rocket reaches its destination.

  As an action, a character may make an **Easy (DI) Gunnery check** to launch a luma flare into the air to provide
  light. Uf he succeeds and the flare has room to travel into the air, he flare completely illuminates an area out to
  long range from the location it was fired. If he fails or does not have room to fire it, the flare still ignites, but
  does not travel into the air. Instead it remainds at ground level, illuminating an area out to short range. Whether he
  succeeds or fails, the flare's illumination continues for five rounds, after which time it burns out.

  Though Luma flares are not designed as weapons, creative characters can nonetheless use them as such. They are
  extremely hard to aim, but the mere prospect of being struck with one will cause many foes to reconsider attacking.
  They have the following profile as a weapon: luma flare (Gunnery) Damage 6, Critical 3, Range Long, Blast 4, Burn 4,
  Disorient 2, Inaccurate 2, Prepare 2, Limited Ammo 1.
encumbrance: 1
rarity: 4
reference:
  - KtP:52
