id: eote-beastfissrit
name: Fissrit
description: Fissrit, also known as "fire worms" are many-legged arthopods measuring just under a third of a meter in
  length. Native to ice worlds, they are able to thrive in frozen conditions through a natural chameical reaction in
  their underbellies that can produce incredible heat. At rest, fissrit produce just enough warmth to survive local
  conditions, but they inrease their heat production to melt snow and ice into liquid water, as well as to kill any prey
  foolish enough to investigate the false oases they produce. Some varieties of the species dwell in colonies, while the
  largest variants are more typically solitary hunters, although all fissrit possess a strong social instinct.
encumbrance: 0
rarity: 7
