id: eote-eodkit
name: Explosive Ordnance Disposal (EOD) Kit
description: >-
  Disarming and disposing of explosive compounds, devices, and military-grade ordnance is a tricky business. It requires
  steady nerves, immense skill, and the proper tools. An EOD kit is perfect for such efforts, as it contains tools
  expressly designed for this dangerous line of work. A kit typically contains a specialized demolitions multitool, a
  small hand scanner, a borescope with a holographic display, and various hand tools and cutting implements. All of the
  items in an EOD kit are constructed of nonreactive, nonconductive materials to prevent the generation of static
  electricity or sparks that could set off explosive devices and compounds. Many Engineers and EOD troopers augment
  their basic kit with a handful of EOD remotes, a powerful engineering scanner, and various other tools to assist them
  in their work.

  An EOD kit adds automatic <advantage></advantage><advantage></advantage> on any checks made to detect and disarm or
  otherwise neutralize explosive compounds and devices.
encumbrance: 4
rarity: 5
reference:
  - FO:48
