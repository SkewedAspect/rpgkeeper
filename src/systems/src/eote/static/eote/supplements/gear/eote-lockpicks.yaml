id: eote-lockpicks
name: Lockpicking Tools
description: |-
  While most locks in the galaxy rely on an electrical component, there exist locations and cultures without a steady
  supply of electricity. Unexpected loss of power can also mean that formerly electronic locks must be manipulated
  manually. In these cases, more archaic options are available to thieves and smugglers looking to surreptitiously
  breach physical security, including laser lockpicks and vibropicks.

  **Models Include:** Various unbranded models.
encumbrance: 1
rarity: 8
reference:
  - FC:49
