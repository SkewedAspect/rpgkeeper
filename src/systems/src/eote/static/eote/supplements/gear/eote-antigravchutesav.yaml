id: eote-antigravchutesav
name: Savior Anti-Grav Chute
description: >-
  Intended to save pilots in the event of an emergency, anti-grav chutes are small backpacks with miniature
  repulsorlifts incorporated into them. An anti-grav chute does not allow the wearer to fly, but rather arrests his fall
  as he nears the ground. With an anti-grav chute equipped, a person can survive a freefall from several kilometers up.
  Specialized military forces also use anti-grav chutes for insertion behind enemy lines or combat assault jumps.

  Characters equipped with an anti-grav chute take no damage or strain from falls. The speed of the fall also decreases
  significantly once the anti-grav chute activates, which means reaching the ground can take multiple rounds.
encumbrance: 1
rarity: 5
reference:
  - SoF:103
