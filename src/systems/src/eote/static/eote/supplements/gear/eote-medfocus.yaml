id: eote-medfocus
name: Meditation Focus
description: |-
  Many of the Force and religious traditions throughout the galaxy develop some form of meditation focus, whether it be
  the prayer beads of the Solaran Hermetic Order, the Cosmic Wheel of the Voss Mystics, or Dagoyan incense. Although
  varied in form, these foci are allied in function, and aiding the user in finding inner peace and enlightenment.

  A Force-sensitive character who has a meditation focus increases his strain threshold by 2 while he is a light side
  paragon.
encumbrance: 1
rarity: 10
reference:
  - F-CRB:190
