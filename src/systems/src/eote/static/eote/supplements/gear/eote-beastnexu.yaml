id: eote-beastnexu
name: Nexu
description: >-
  Orignally native to the jungles of Cholganna, nexu have been transplanted across the galaxy since they were first
  discovered to be domesticable. Sometimes used as guard animals, they are far more commonly trained as arena combatants
  for use in gladitorial games and challenges. They demand is driven part by their fearsome appearance with a huge
  toothy maw, four beady eyes and massive claw-tipped paws, all backed up by a pair of barbed tail spikes. What's more,
  nexu are fully as lethal as their natural armament would suggest, and possess a temperment and instictive cunning that
  make them even greater threats.

  Although naturally stealthy and elusive, nexu do not lack for ferocity or mettle in a direct fight, and they rarely
  back down in the face of any threat they encounter. Even then faced wth more ferocious predator, nexu are more likely
  to attempt to melt away into the underbrush or other cover and attack again using stealth to gain the advantage than
  to simply flee their hunting grounds. Of course, this means that training such fierce beasts is a dangerous and
  unforgiving task, but the demand for them means there are always those willing to take the risk.
encumbrance: 0
rarity: 4
reference:
  - SS:77
