id: eote-spraycast
name: Spray Plasto-Cast
description: >-
  Quickly immobilizing a limb injury after it happens can prevent the extremity from becoming more seriously damaged
  through accidental misuse. Prompt action reduces the patient's overall healing time, even though further treatment may
  be required before proper healing can begin. A spray plasto-cast is an easily portable tool that can be used in field
  conditions. When a patient suffers a serious injury, the cast reinforces the wounded limb from the outside, preventing
  it from bending and exacerbating the tissue damage.

  A character can make an **Easy (<difficulty></difficulty>) Medicine check** to apply a spray plasto-cast to a limb
  that has been crippled or disabled due to a Critical Injury. If successful, the Critical Injury heals automatically
  after one week of narrative time.
encumbrance: 1
rarity: 1
reference:
  - DoH:50
