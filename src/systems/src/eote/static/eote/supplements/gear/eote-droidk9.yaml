id: eote-droidk9
name: K-9 Series Hunting Droid
description: |-
  Cybot Galactica K-9 Series Hunting Droid

  On the wilder worlds in the Outer Rim, many sentients still stalk the wild beasts of their native lands as their
  ancestors have done for millennia. While much of this activity, especially on the more primitive worlds, is largely
  done to put food on the table, there are those hardy individuals for whom it is more a sport and less a necessity.
  Big-game hunting is big business in the Outer Rim, whether for exotic pets, firs, trophies, rare delicacies, or new
  chemical compounds and other components valuable to corporations. The men and women who spend their time stalking
  these creatures often travel with an animal or droid companion.

  To aid hunters, Cybot Galactica sells the K-9 series hunting-and-tracking droid. Large, stoutly constructed droids
  roughly the size of a krayt-dragon hatchling, they have a distinctly canine appearance with their long bodies,
  wedge-shaped heads, and powerful tails. They are equipped with top-of-the-line sensors that allow them to hear
  frequencies well outside the ranges of most sentients as well as to see in the dark, perceive thermal emissions, and
  see over long distances. They are also one of the few droids equipped with advanced olfactory sensors, allowing the
  K-9 series to track by scent. They have crushing jaws full of sharp teeth, and their feet are equipped with
  retractable claws to help them take down their prey.

  The K-9 series droids are also quite powerful, agile, and cunning, capable of leading other droids or hunting animals
  in packs. While they are intelligent, their programming and personalities are so focused that they tend to speak, when
  they speak at all, in clipped sentences punctuated with animal sounds and machine noises.
