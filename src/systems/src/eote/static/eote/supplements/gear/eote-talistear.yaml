id: eote-talistear
name: Tear of the Elders
description: >-
  Before humans ever came to Naboo, another starfaring species discovered the Gungans in Naboo’s swamps and seas. Little
  is known about these so-called “Elders” beyond what can be gleaned from the statuary they left behind on the planet
  and on Rori, one of the planet’s three moons. The Elders, it is theorized, were humanlike in appearance, though even
  that conjecture is only tenable if the enormous faces of their monuments are held to be representative of the Elders
  themselves, which is far from certain. Another theory, based on certain features of the faces, holds that the Elders
  were Force users. This would seem even more tenuous than other beliefs concerning their physiology, were it not for
  the existence of a Force artifact known as the Tear of the Elders.

  Long treasured by the Gungans, the Tear of the Elders is a fist-sized piece of granitic rock, shaped, as its name
  suggests, in a teardrop formation. Teams of Gungan geologists and artisans who analyzed the Tear uncovered three
  crucial facts. First, it is formed of the same substance the Elders used in their statues, a rock matrix native to
  Naboo and its moons. Second, none of the hundreds of known examples of Elder statuary depict tears. Finally, unlike
  the monumental statues, the Tear has no toolmarks of any kind. These facts, along with the Tear’s shape, would suggest
  that it is an unlikely, but not impossible, naturally occurring stone form, were it not for the widely known legend
  about it.

  According to this legend (Gungan scholars insist that it is historical truth, though they can offer no documentary
  evidence supporting their claim), sometime in the long years between the departure of the Elders and the first visits
  to Naboo by humans, the Gungan people adopted the relics of the Elders into their religion in practices that continue
  to this day. The isolated monuments of the Elders are considered holy sites, and they are venerated as places of great
  power. It was at one of these sites—the Gungans do not say which, specifically—that the event they call “Tearfall”
  occurred.

  Force sensitivity is neither rarer nor more frequent among the Gungans than the galactic average, so it is no surprise
  that before the rise of the Republic and the founding of the Jedi Order, some few Gungans evinced powers that would
  now be recognized as Force-based. One such Gungan, his name lost to history, was the resident guardian of an Elder
  statue. In the course of his meditations, this Gungan cast his awareness out into the world, eventually becoming so
  skilled that he could sense events over the whole surface of Naboo, and even beyond. On the day he sat before the
  Elder statue and sensed the first human scout ships entering orbit, a great and unaccountable grief overcame the
  Gungan mystic. When he looked up, he saw a gray tear impossibly welling up in the stone face he sat before. Holding
  out his hand, he caught the Tear of the Elders in his hand as it fell.
