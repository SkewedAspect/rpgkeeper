id: eote-droidstoneguard
name: Stone Guardian
description: |-
  Some facilities require discretion and art as much as they do security. Stone guardian droids are specifically
  designed for these situations. They provide a potent defense that is utterly in keeping with the overall tone of a
  site.

  Despite the name, stone guardians are not actually constructed out of stone. Their armored shells are simply sculpted
  and painted to resemble some form of rock or marble. When inactive, stone guardians appear to be decorative statues.
  The statues might be freestanding, or they could appear to be a support pillar or a part of a wall. Only when they
  activate does their true nature become clear. A stone guardian’s passive detectors are extremely sensitive and rigged
  to detect any intruders who enter its domain. When they identify a threat, the droids activate and attempt to
  eliminate it.
encumbrance: 0
rarity: 10
reference:
  - NoP:106
