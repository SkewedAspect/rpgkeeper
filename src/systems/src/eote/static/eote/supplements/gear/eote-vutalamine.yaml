id: eote-vutalamine
name: Vutalamine
description: >-
  Vutalamine is a common anti-anxiety drug that BioTech Industries produces and sells throughout the galaxy.
  Colloquially known as "vue," it has been a mainstay of the galactic pharmacopeia for treating psychological maladies,
  muscle spasms, and seizures for at least a century. Vue has a calming effect that allows individuals to process
  information more clearly and make better decisions. It also slows down breathing and circulation, along with reducing
  tremors and steadying limbs. Thanks to these last qualities, many sharpshooters, slicers, and assassins use the drug
  to help steady their hands while shooting or to steady their nerves in extremely stressful situations. Long-term use
  of vue can be addicting, and side effects can include acute paranoia, suicidal ideation, and impairment of memory and
  judgement.

  A single dose of vue lasts for twenty-four hours. During that time, the character upgrades the ability of any checks
  made to resist stress or fear once. In addition, the difficulty of Ranged (Light) and Ranged (Heavy) checks made at
  long or extreme range is reduced by one. At the Game Master's discretion, frequent use of vue can cause impaired
  judgement and loss of memory, imposing permanent <setback></setback> on Intellect- and Cunning-based checks.
encumbrance: 0
rarity: 5
reference:
  - CaM:43
