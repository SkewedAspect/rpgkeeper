id: eote-cargoscan
name: Cargo Scanner
description: |-
  To smugglers and free traders, the humble cargo scanner is every bit as useful as a blaster, if not more so. These
  small, hand-held scanners can quickly catalog cargo and calculate its mass, volume, and dimensions. By programming in
  the shape and size of a ship's cargo holds, a cargo scanner computes the most efficient method of loading and stowing
  freight.

  A character using a cargo scanner may make an **Average (<difficulty></difficulty><difficulty></difficulty>)
  Computers** check to increase the available encumbrance capacity of a planetary vehicle or starship with a silhouette
  of 3 or more by 10 percent (rounding up) thanks to more efficient organization.

  **Models Include:** Fabritech A-11 cargo scanner.
encumbrance: 1
rarity: 4
reference:
  - FC:50
