id: eote-beastflutter
name: Mantellian Flutterplume
description: The flutterplumes of Ord Mantell are a species of large carnivorous avians with powerful, hooked beaks and
  four sets of razor-sharp talons. While they primarily feed on carrion using their talons to slice apart fallen beasts,
  hungry flutterplumes have been known to turn on vulnerable looking living prey in hops of an easy meal. Given the size
  and capablities of these creatures an "easy meal" can mean anything frin a wounded herd beast not yet fully dead to a
  lone sentient without obvious means of self-defense. Most flutterplume populations have learned to respect blasters
  but there are enough stories of bold or hungry specimens attacking isolated travelers that they have developed a
  fearsome reputation quite at odds with their flowery name and dazzling plumage.
encumbrance: 0
rarity: 4
reference:
  - SS:76
