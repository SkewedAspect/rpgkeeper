id: eote-droid87rmcoll
name: 87-RM Scout Collector Droid
description: >-
  SoroSuub Corporation 87-RM Scout Collector Droid

  The 87-RM Scout Collector and Wanderer Scout Surveyor are companion droid units designed to work together in concert.
  Produced by SoroSuub after the original manufacturer (Serv-O-Droid, Inc.) went out of business, the 87-RM is an
  independent droid unit designed to aid frontier biologists and botanists in locating and capturing new and exotic
  biological specimens.

  The 87-RM resembles a large (2.5 meters high) box, hovering off the ground on repulsorlifts. This boxy form is
  necessary; the 87-RM's guts contain a cryogenic cubical storage container large enough to hold—and flash-freeze into
  cryogenic hibernation—a Tatooine dewback. The 87-RM grabs stunned specimens with its heavy-lifting servo-arms and
  places them inside the container for freezing and transport.
encumbrance: 0
