id: eote-synsk
name: Synthskin
description: |-
  /Synthflesh

  These artificial flesh coatings are used both to treat injuries and to coat cybernetic limbs. Synthskin is more
  commonly used to bond with real tissue, usually to aid in recovery, while synthflesh is more often used to cover
  mechanical devices to make them appear organic; these can include entire droids when a realistic appearance is
  desired. As with stimpacks, synthskin is made by countless companies, although BioTech Industries is a leading
  manufacturer in the field.

  Synthskin applications can be used as first aid to treat cuts and bruises. Synthskin applications are one-use items.

  **Models Include:** Numerous Variants.

  **Models Include:** Numerous Variants.
