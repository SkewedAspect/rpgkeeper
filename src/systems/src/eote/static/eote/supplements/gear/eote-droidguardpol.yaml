id: eote-droidguardpol
name: Guardian Police Droid
description: |-
  GU-series "Guardian" police droids were the primary law enforcement droids operated by the Coruscant Security Force
  during the final years of the Republic. Designed and built by Cybot Galactica specifically for the CSF, countless
  thousands of these droids patrolled the sprawling upper levels of Coruscant's Galactic City for generations. While in
  service, GU-series droids gained a repuation as solid and levelheaded, if unimaginative, law enforcers. They were
  programmed for various police work, such as patrol, peacekeeping, crime scene investigation, detective work, and riot
  control. Although they were reliable, the GU-series droids suffered drom a lack of iniative. Clever or dedicated
  criminals could usually outhink them with little difficulty.

  Guardian police droids stand just under two meters tall. They have roughly human proportions, with long dexterous arms
  powerful legs, and a round head with gold-colored photoreceptors. Their heads are capped with a tall, cap-like
  structure reminiscent of a shako or kepi, complete with a short brim over their photoreceptors, this structure houses
  sensors and a powerfil commications suite. The droids are  often painted dark blue with silver and white accents, with
  a CSF badge painted on their left chest plate. When on patrol, Guardians are typically armed with a BlasTech SS-410
  Police Spcial blaster pistol and a simple truncheon. Depending on the situation, they can also be equipped with stun
  batons, grenade launchers, riot shields, and blaster rifles.
   By the end of the Clone Wars and the rise of the Galactic Empire, most Guardian droids were phased out of operation with the CSF.  Replaced by Stormtroopers and newer-model, more aggressive droids, surplus GU-series droids were sold off to other worlds, reassigned to lower-priority sectors, or simply scrapped. Some can still be found patrolling the lower levels of the Imperial capitol, however. Many of these veteran droids have not had a memory wipe in decades and some have even developed very distinct personalities similar to no-nonsense police officers. They still serve the people of Coruscant, but most are entirely too old and outdated to be carrying out actual police duties.
