id: eote-speciesdb
name: Species Database
description: |-
  Every encounter with a new species offers the possibility of biological offense, embarrassment, or even accidental
  poisoning. To avoid this, many organizations equip their diplomats with custom-built datapads loaded with specific
  biological details of every known species. In theory, such compendiums help operatives avoid injuring a sensitive body
  part or inadvertently wearing a known allergen as floral decoration. Cynical individuals have noted, however, that
  such information can also be used for more nefarious purposes. Most species databases also contain cursory cultural
  notes, but the core focus of such texts is biology rather than historical or societal studies.

  A character using a species database adds <boost></boost><boost></boost> to Knowledge (Xenology) checks.

  **Models include:** The writings of Mammon Hoole.
encumbrance: 2
rarity: 2
reference:
  - DA:53
