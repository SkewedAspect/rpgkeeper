id: eote-vurkorb
name: Vurk Meditation Orb
description: |-
  Life on Sembla owes a great deal to the planet's many active volcanoes. The intense geothermal energy of the planet
  warms the world's shallow seas. The seas, in turn, host a cavalcade of life. Lava flows bring minerals and materials
  to the surface. While they never developed heavy industry, the Vurk are famous for their craftsmanship. The vast
  majority of art produced on Sembla depicts the volcanoes. At times, this reverence has bordered on religious devotion.

  One of the oldest tokens of this reverence is the Vurk Meditation

  Orb. The orbs are perfect obsidian spheres, roughly 15 centimeters across. Part of the consecration process involves
  polishing the surface to a mirror sheen. Even though the Vurk invest a lot of time into crafting them, they do not
  consider them manufactured. From the traditional standpoint, they are not made so much as found. Any spherical chunk
  of obsidian can serve the orb's function. While the most sacred orbs are perfectly black, sages tolerate-even
  prefer-the presence of impurities within the glass.

  Studying the opaque sphere allows a Mystic to focus inwards, leaving the world behind. In this state, they see only
  the connections between beings, hear only the whispers of the Force. This meditation lasts for at least an hour, and
  for the 24 hours following this meditation, they may suffer 2 strain to add <forcepoint></forcepoint> to the results
  of the next check to use the Alter or Battle Meditation Force power.
encumbrance: 2
rarity: 6
reference:
  - UP:54
