id: eote-droidsiak
name: Siak-Series Protocol Droid
description: |-
  Roche Siak-Series Protocol Droid
        
  Following the stunning failure of the J9 worker drone, the Verpine decided to redesign their protocol droid from the
  ground up. Roche hired a group of human contractors to assist with the new design, ensuring that the droid’s chassis
  and personality matrix were more appealing to a mammalian customer base.

  The Siak’s personality is businesslike while remaining personable, and it can readily converse for hours about nearly
  any topic. Physically, the droid is a lot

  more human than its predecessor, while retaining some obvious Verpine characteristics. As a result, the Siak-series
  protocol droid represents one of Roche’s most successful products.
encumbrance: 0
rarity: 4
reference:
  - SoR:113
