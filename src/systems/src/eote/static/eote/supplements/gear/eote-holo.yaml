id: eote-holo
name: Holo-messenger
description: Usually reserved for formal affairs or the dealings of the wealthy, these small, disk-like devices create
  holographic recordings or transmissions that may be played back as a small projection. The user can easily hold a
  holo-messenger in one hand. Though uncommon, they have played an integral part in many revenge or entrapment schemes.
