id: eote-beastcall
name: Beast Call
description: |-
  Made by a number of companies, most notably Fabritech, beast calls are some of the more simple and effective tools
  used by hunters and trappers. Little more than a small audio-playback machine encased in a sturdy, impact-resistant
  shell, a beast call is used to lure creatures out of hiding by speaking to them in their own language. They contain a
  sophisticated audio-signal modulator similar to those used by droid manufacturers to give their creations voice, as
  well as a nearly bottomless programmable database capable of holding the various screeches, howls, and calls of
  numerous known animal species throughout the galaxy. Along with the preprogrammed database, these devices can also
  record sounds, allowing a user to build his own sound library generated by previously unknown creatures.

  To use, a hunter simply sets the type of beast he wants to attract, places the beast call in a convenient area; and
  activates it. The call then plays back the appropriate sounds at varying pitches and volumes until a creature or
  creatures are attracted or the user turns the device off. The sounds produced by the beast call are so realistic that
  members of the species being imitated are hard pressed not to come as quickly as they can to investigate.

  Using a beast call to lure an animal requires no skill check, but the beast being targeted must make an **Average
  (<difficulty></difficulty><difficulty></difficulty>) Discipline check** to resist the call. To record a particular
  beast's call to use later, the user must make an **Average (<difficulty></difficulty><difficulty></difficulty>)
  Computers check** modified by any other environmental conditions (heavy background noise, atmospheric interference,
  etc).
encumbrance: 1
rarity: 3
reference:
  - EtU:51
  - SS:46
