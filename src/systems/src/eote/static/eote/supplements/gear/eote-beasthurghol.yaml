id: eote-beasthurghol
name: Hurghol
description: The mountain dwelling hurghols are surefotted, reptilian climbers, whose many jointed limbs allow them to
  move across almost any incline or surface. However, the species' most unusual trait is not its deft climbing, but its
  diet—or arguably, its lack of one. While some believe that hurghols ingest a mineral diet, as they lick or even chew
  at the rocks of their mountain homes. In truth they only draw in trace elements from this habit, used to strengthen
  their hides against harsh elements. As far as can be determined, they do not need to eat at all in the commonly
  understood sense, instead drawing all the energy needed to survive from the Force itself. Stories have circulated
  through the galaxy of incredible feats of endurance by hurghols such as falling down a steep inclines and breaking
  legs, then climbing out unperturbed months laterm after the limbs healed naturally.
encumbrance: 0
