id: eote-droiddz70
name: DZ-70 Fugitive Tracker Droid
description: The DZ-70 by Arakyd Industries is one of the most popular tracking droids on the market today. Used by
  militaries and law enforcement agencies throughout the galaxy, these small droids are not particularly bright but are
  expert trackers and are incredibly persistent in the pursuit of a target. Around two meters across, the DZ-70 is a
  small, spherical droid equipped with a powerful repulsorlift system that provides excellent agility and overland
  speed. The droid's hull is studded with photoreceptors and assorted sensors that give it an unrestricted, 360 degree
  view of its surroundings. Two powerful, retractable claws are housed in covered bays along the droid's bottom, and it
  carries a blaster pistol and ion blaster as standard armament. While quite competent despite its low intelligence, a
  DZ-70's natural zeal and tenaciousness may occasionally lead to the development of an at all costs" mentality if the
  droid isn't given proper maintenance and regular memory wipes. This means that the droid does everything in its power,
  including the use of lethal force, to bring a fugitive to justice.
encumbrance: 0
rarity: 4
