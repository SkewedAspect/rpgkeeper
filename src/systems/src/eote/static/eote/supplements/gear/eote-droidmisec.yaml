id: eote-droidmisec
name: MI-Series Security Droid
description: |-
  Holowan MEchanicals' imposing MI-series security droids are some of the most efficent and dengerous droids in the
  galaxy. A recent entry into an already crowded security droids field, Holowan made its new droids stand out by arming
  them to their metaphorical teeth and margeting them heavily among wealthy civilians and small planetary governments.
  Its plan paid off, and within a scant few years it had a nearly two-year waiting list for new MI-series models.

  At first glance, MI-series droids look more like a frontline combat droids than private security units. They stand
  just over two meters tall and are covered in thick plasteel armor of a type usually found in heavy battel hardsuits
  and power-assisted armor. They have two heavy duty front legs that end in broad feet, and a small, armored head fitted
  with two large, red photoreceptors. Their most striking features are the two sets of arms mounted to their torso.

  The upper arms, which are mounted to the droid's shoulders, are proportional to the size of the droid. Each of these
  arm ends in a powerful weapon cluster that includes a pair of light repeating blasters and a pair of short-range stun
  blasters. The lower arms are huge, seeming much larger than the droid's chassis should be able to support and end in
  a  pair of massive, powerful hands, each with two fingers  and an opposable thumb. The weapons loadout, multitude of
  arms, and very aggressive programming with which these droids are equipped makes them incredibly formidable opponents.

  MI-series droids have stern humorless personalities and are given to barking orders and making bold declarations.
  Their voices have a deep, resonant tone that heightens their intimidation factor. They are programmed to close quickly
  with non-hostiles invading their personal space while warning or ordering them away from some forbidden area. Very few
  individuals in the galaxy can withstand having a two-meter tall heavily armedm very angry froid looming over them
  while demanding they leave an area lest the droid open fire. MI-series droids that go for too long without a memory
  wipe tend to develop distrubing, almost sadistic personality traits and can become unhinged and dangerous without
  constant upkeep. At least one of these powerful droids, a unit designated MI-726, is known to have gone rogue and
  taken up a life of anti-Imperial crime.
encumbrance: 0
rarity: 7
