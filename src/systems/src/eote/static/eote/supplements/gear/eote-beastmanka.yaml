id: eote-beastmanka
name: Manka Cat
description: A rare example of a feline predator with a pack instinct, manka cats have been found across the mountains
  and grasslands of a number of the Core Worlds still lightly settled enough to have wilderness areas. These creatures
  range from 1.5 to nearly 2 meters in length, although they have low-slung bodies for hiding in tall grass or among
  rock formations. Manka cats are also distinguishable by the thick manes of fur around their nexks, and the two sets of
  menacing, forward-jutting tusks in their lower jaws. Although they still can be found on other worldsm one of the
  largest populations of the species was located in the mountains of Alderaan. With that planet;s destructionm the
  species has had its numbers thinned considerable, although they are not yet truly endangered.
encumbrance: 0
rarity: 8
