id: eote-wildkit
name: Wilderness Survival Kit
description: >-
  Wilderness survival kits are a necessary precaution for those who regularly travel through inhospitable areas. Most
  survival kits include a thermal cloak, a multitool or survival knife, a distress beacon, two emergency comlinks, a
  spool of wire, ration bars, a basic medpac, two respirators, a water jug with filter, a glow rod, fifty meters of
  high-tensile microfiber line, ten ration packs, and an emergency flare gun.

  **Models Include:** Pretormin Environmental WanderKit.
encumbrance: 5
rarity: 2
reference:
  - A-CRB:196
  - F-CRB:188
