id: eote-droidig100
name: IG-100 Magnaguard Droid
description: Thankfully rare, IG-100 MagnaGuard droids are relics of the Clone Wars, during which they served as elite
  bodyguards and shock troops for Separatist leaders. Though most were destroyed during the wars, some examples of the
  type are still active in the galaxy. Most such survivors are bound to the service of criminal overlords. Imperial
  Moffs, or other power brokers. More terrifying are those few who have been manumitted haunting the hyperlanes alone or
  in pairs, following unknowable agendas. MagnaGuards are fearless combatants and reject ranged weapons out of hand,
  preferring to swiftly close with their opponents and engage them with their deadly electrostaves, which emit tendrils
  of energy designed to incapacitate and disorient foes.
encumbrance: 0
rarity: 10
reference:
  - F-CRB:409
