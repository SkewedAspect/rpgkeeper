id: eote-talisherdgaunt
name: Herder's Gauntlet
description: |-
  The Iktotchi people are blessed with the talents of precognition, an ability found to benefit from augmentation by the
  Force when their world was incorporated into the Republic thousands of years ago. Though their natural talent for
  foretelling the future fades exponentially the farther they travel from their home moon, Iktotchi Force sensitives,
  particularly among the Jedi, formulated many techniques to expand and refine their native precognitive abilities using
  the Force.

  One common Force power that did not come naturally to the Iktotchi, however, was the ability to move objects at a
  distance. Their native precognition, in other words, did not translate automatically into skill with the Force ability
  that mimics telekinesis. Though Iktotchi Jedi more than made up for this with their mastery of other Force talents,
  the Jedi Master Needa Kame saw an opportunity in the seeming shortcoming.

  Around 900 BBY, Needa Kame took a leave of absence from his Jedi duties and traveled to Iktotch for an extended period
  of meditation and study. He built a retreat in the mountains of that windswept moon, and devoted over a decade to
  developing the Force-imbued Gauntlet that bears his name. Exquisitely crafted from the hide and horns of a sure-footed
  ungulate native to the Iktotchi highlands, the Herder’s Gauntlet is, unsurprisingly, fitted for an Iktotchi, with
  larger fingers and a broader palm than a human’s.

  During his years of working on the Gauntlet, Master Kame was not completely isolated. The inhabitants of the village
  closest to his simple dwelling frequently made the half-day trek to visit the Jedi, bringing him food and other
  supplies in exchange for advice, or out of simple neighborliness. Over time, the children of the village transitioned
  from fearing the strange old man to adopting him as a sort of eccentric grandfather. Needa Kame did not discourage
  this, being possessed of both a gentle soul and a sparkling sense of humor.

  It was this latter quality that eventually led to the breakthrough that allowed the completion of the Herder’s
  Gauntlet. Through years of experimentation and tinkering, Master Kame had come frustratingly close to realizing his
  ambition of creating an aid for Iktotchi Force users unskilled at telekinesis time and time again, only to have some
  obstacle or oversight see him fall short. It was when the village children were visiting him on one occasion that the
  Jedi, wearing the Gauntlet because he had been working on it when they arrived, decided to amuse his guests with some
  legerdemain, showing off some perfectly mundane sleight-of-hand tricks he had learned at the Jedi Temple on Coruscant
  in his student days. But Needa Kame fumbled the trick he was performing (pulling a local fruit from behind a small
  girl’s ear), earning good hearted jeers from the children. At that moment, the Jedi experienced a revelation,
  realizing that his Gauntlet was as advanced as it ever need be. Instead, it was his application of the Force that had
  been wanting. Readdressing the problem, he centered himself, held out his gauntleted hand, and lifted the delighted
  little girl into the air.

  A Force-sensitive character who wears the Herder’s Gauntlet counts as possessing the Move basic power, and may make a
  Move Force power action as a maneuver. A character who does so may not attack an opponent with this use of the Force
  power (what constitutes an attack is ultimately up to the GM, but should include disarming or incapacitating opponents
  as well as dealing damage).
encumbrance: 0
rarity: 9
