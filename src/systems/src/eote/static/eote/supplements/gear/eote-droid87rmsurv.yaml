id: eote-droid87rmsurv
name: Wanderer Scout Surveyor Droid
description: |-
  SoroSuub Corporation 87-RM Scout Surveyor Droid

  The 87-RM Scout Collector and Wanderer Scout Surveyor are companion droid units designed to work together in concert.
  Produced by SoroSuub after the original manufacturer (Serv-O-Droid, Inc.) went out of business, the 87-RM is an
  independent droid unit designed to aid frontier biologists and botanists in locating and capturing new and exotic
  biological specimens.

  The Wanderer Scout Surveyor is a slightly smaller (roughly human sized) droid with a spherical body and up to eight
  spidery legs. Their design allows for remarkable speed and agility, enabling them to track targets and incapacitate
  them with a powerful stun blaster. Once unconscious, the 87-RM swoops in to gather the specimen. A single 87-RM
  usually carries one to three Wanderers, and the droids can work in concert to herd and track down their prey.
encumbrance: 0
