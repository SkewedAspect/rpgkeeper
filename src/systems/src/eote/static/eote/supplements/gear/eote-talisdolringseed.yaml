id: eote-talisdolringseed
name: Dolina Ring Seeds
description: |-
  The swampy world of Dagobah has been erased from galactic charts, but the rare visitors of times past brought away
  samples of the planet’s unique flora and fauna. One example from Dagobah’s extensive catalog of vegetative wonders is
  the dolina ring seed, samples of which are held by several universities and agribusiness concerns throughout the
  galaxy. Although the samples’ provenance is now unknown, their unusual shape and mysterious properties continue to be
  studied by scientists.

  The seeds are just that, embryonic plants forming both the culmination and the beginning of the life cycle of an
  unknown angiosperm. However, unlike the vast majority of coated seeds that have been cataloged from across known
  space, dolina ring seeds are not spherical or ovoid. Instead, the hardened fruit layer, or endocarp, surrounding and
  fused to the actual seed material takes the form of a woody ring about three centimeters in diameter. This unique
  shape has long fascinated biologists, who seek to learn what form of plant might grow from a ring. However, no dolina
  ring seeds have ever germinated away from the soggy soils of Dagobah, so no one now living knows what manner of shrub,
  flowering plant, or tree might grow from them.

  Normally, thus stymied, scientists would turn their attention to some other wonder, but the dolina ring seeds have
  characteristics that make them fascinating on their own. For one thing, they are near-indestructible, capable of
  withstanding tremendous pressures, extremes of temperature, and baths of caustic and corrosive chemicals with little
  or no physical evidence of trauma to their outer coatings. Another property unusual in a clearly biological artifact
  is the seeds' extraordinary density. Though small enough to be held in the palm of a human’s hand, and even of a size
  and shape appropriate to be worn as jewelry on some sentients’ fingers, dolina ring seeds mass in at an incredible
  nine kilograms on average, making them some of the heaviest known plant matter.

  There is another characteristic of dolina ring seeds, known to only the very few Force-sensitive scientists who have
  studied them, kept as a closely guarded secret. Their Force reactivity was first discovered and described by a
  Sullustan agronomist in the employ of a Mid Rim foodstuffs company just a few years after the end of the Clone Wars.
  All of this scientist’s research, and the scientist herself, were promptly confiscated by agents of the Empire. Around
  the same time, a human farmer and chemist working independently came across a dolina ring seed in a lot of seed stocks
  he had purchased as part of a load of salvage from a Trandoshan junk dealer. Unaware of the scant findings that had
  been published about the ring seeds, this man at first kept the sample as a simple curiosity. It was only when an
  Imperial sweep of his planet for Force sensitives targeted his young daughter that the ring’s value became apparent.

  Seeking to protect his daughter from Inquisitorial kidnapping, the farmer hid her in his laboratory while he tried to
  convince the Imperial agents that she was offworld with her mother. A quick records check showed the agents that the
  farmer was in fact a widower, and then the casual brutality of the Empire evinced itself as they shot the man in cold
  blood. Overhearing the execution, the girl cast about desperately for anything that might save her, and it was then
  that the innate Force abilities that had attracted the attention of the Inquisition in the first place reacted with
  the dolina ring seed. Sensing that she should do so, and ignoring its incredible weight, the girl slipped the seed
  onto her thumb. The energy of the Living Force filled her body, taking the form of an incredible burst of speed. The
  Imperial agents saw only a blur as she fled into the night, never to be seen by them again.

  Now a grown woman, Syla Trasker is an accomplished Force adept and a member of the Rebellion. She still wears the
  dolina ring seed her father found, now on a chain around her neck, its weight unfelt and thus no hindrance. It gives
  her the ability to run at tremendous Force-granted speeds, though such efforts are only sustainable for a short time
  and are exhausting. Tests performed by Syla and Rebellion scientists show that both the variable weight and the
  speedgranting properties of the seed are only active when it is held by a Force-sensitive being.

  A Force-sensitive character who possesses a dolina ring seed may perform one free Move maneuver during each of his
  turns. This Move maneuver may be in addition to any other maneuvers performed this turn and can allow the character to
  perform three maneuvers in a turn. (The user also ignores the ring seed’s weight.)
encumbrance: 0
rarity: 10
