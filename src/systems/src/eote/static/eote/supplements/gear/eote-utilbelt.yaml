id: eote-utilbelt
name: Utility Belt
description: |-
  A utility belt is a common item for those on active missions where quick access to tools and gear is a necessity; even
  Imperial stormtroopers use them. Their contents will vary with their user and their planned actions; sabotage missions
  might have belts with explosives and security slicer chips, while a ship mechanic might have his stuffed with his
  favorite tools. Some belts also have weapon holsters or clips.

  Utility belts increase the character's encumbrance threshold by 1.

  **Models Include:** Numerous Variants.
encumbrance: 0
rarity: 0
