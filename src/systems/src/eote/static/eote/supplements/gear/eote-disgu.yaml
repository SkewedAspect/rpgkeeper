id: eote-disgu
name: Disguise Kit
description: |-
  Despite what are undoubtedly stunning features (or because of them), there are many times when an individual needs to
  look less like himself. Disguise kits contain the means to make this happen, with makeup, false hairpieces, iris
  chromatics, and even falseprint skins and DNA cloaks in advanced kits. Other kits can contain practical camouflage
  gear for urban and field settings, for blending into surroundings rather than with other people. There are numerous
  disguise kits made across the galaxy, especially since many must be made for a specific type of species. However, they
  all contain similar materials and share similar costs.

  **Models Include:** Numerous Variants.
encumbrance: 2
rarity: 4
