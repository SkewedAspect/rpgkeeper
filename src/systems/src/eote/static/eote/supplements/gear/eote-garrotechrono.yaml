id: eote-garrotechrono
name: Garrote Chrono
description: |-
  Garrote chronos are one of a number of specialized concealed weapons designed for use by field agents. At first
  glance, a garrote chrono looks like any common wrist chrono found throughout the galaxy. Hidden inside the chrono is a
  retractable garrote made of spun durasteel, with a sturdy ring on the end. This gives agents constant access to a
  weapon, even when they have been searched and ostensibly disarmed. Garrote chronos are very popular among deadly
  assassins and deceptive undercover agents.

  This item provides the wearer with a retractable garrote hidden within a standard chrono. Upgrade the difficulty of
  checks to detect the concealed garrote twice.
encumbrance: 0
rarity: 7
reference:
  - CaM:48
