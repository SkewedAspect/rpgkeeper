id: eote-beastcracian
name: Cracian Thumper Riding Beast
description: Exported from Craci in the Corporate Sector, Cracian thumpers have become one of the most widespread riding
  animals in the galaxy. These bipedal herbivores bear features resembling a mix between that of a large rodent and a
  horse, and sport sharp claws on both their forelimbs and large, powerful hind legs. They have long faces with broad
  snouts and upright ears. There are numerous breeds of Cracian thumpers, primarily distinguished between long- and
  short-hair varieties. The former are well-suited to colder environments, resembling the tauntauns of Hoth. Despite
  their name, Cracian thumpers naturally move with great stealth, making them ideal mounts for Rebel Beast Riders.
encumbrance: 0
rarity: 2
reference:
  - SoT:84
