id: eote-enghammer
name: Engineer's Hammer
description: |-
  An engineer's hammer is an all-purpose construction and demolitions tool. It has a meter-long, reinforced plasteel
  haft capped at one end with a heavy sledgehammer head and at the other with a prybar. It is typically used to breach
  doorways, destroy walls, pull down fixtures, and generally destroy structures by hand. It can also, in a pinch, be
  used as a melee weapon, a common occurrence with Alliance engineering units.

  Using an engineer's hammer adds <boost></boost><boost></boost> to any checks made to build or demolish structures.
  When used as a weapon, it has the following profile: Melee; Damage + 3; Critical 5; Range (Engaged); Cumbersome 3,
  Disorient 1, Knockdown.
encumbrance: 2
rarity: 2
reference:
  - FO:47
