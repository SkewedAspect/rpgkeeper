id: eote-beastclamber
name: Jerethian Clamberwolf
description: The powerful, heavily furred clamberwolves are the unquestion apex predators of the forests on their
  homeworld of Jereth VI. Their fierce, lupine muzzles and ripping talons can take down almost any prey, but in their
  native forests, it is their natural deftness at climbing that places them atop the food chain. Clamberwolves are
  capable of cunning ambushes and and tactics that can take down larger animals or leave weak prey with nowhere to run.
  They are surprisingly intelligent for mere beasts, but their natural aggression makes studying or training them
  difficult for most.
encumbrance: 0
rarity: 7
reference:
  - SS:75
