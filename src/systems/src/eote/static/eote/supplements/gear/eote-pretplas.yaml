id: eote-pretplas
name: Pretormin Plastent
description: >-
  Alliance standard issue, this triangular two-meter tent inflates and anchors in minutes, and sleeps up to four. It is
  available in various colors and patters, but is ill-suited to  extreme environments. Rebel personnel ofent mount
  SE-Vigilant sensor pods atop their tents as an automated sentry.

  Sleeping in a plastent removes <setback></setback><setback></setback> from the user's checks to resist hostile
  temperatures while sleeping and downgrades the difficulty of any such checks once.
encumbrance: 10
rarity: 2
reference:
  - FiB:54
