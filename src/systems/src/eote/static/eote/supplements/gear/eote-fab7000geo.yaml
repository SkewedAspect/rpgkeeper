id: eote-fab7000geo
name: Fabritech 7000 Geoscanner
description: |-
  Miners and prospectors depend upon a reliable geoscanner to identify the location of ore deposits. A range of
  different sensors probe beneath a planet's surface to a depth of nearly two kilometers. These handheld devices can
  detect the different elements and minerals present in the strata as well as ascertaining their relative frequences.
  These systems can be tuned to recognize precious minerals and ores, even estimating the quantity and trade value of
  deposits. Geoscanners warn users of any seismic, volcanic, or thermal activity, so that appropriate precautions may be
  taken. They also recognize hollow areas and subsurface water deposits, which can be crucial in choosing a location to
  mine.

  A geoscanner adds <boost></boost> to any Perception, Lore, or Education checks related to studying the subterranean
  environment within medium range of the user.
encumbrance: 2
rarity: 0
reference:
  - DoH:48
