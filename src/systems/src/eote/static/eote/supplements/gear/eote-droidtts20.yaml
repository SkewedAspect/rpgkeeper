id: eote-droidtts20
name: TTS20-Series Dialectic Droid
description: >-
  _TTS20_-Series Dialectic Droid

  Throughout the history of the galaxy, there have been many innovative approaches to education. While the inevitable
  march of progress has seen a veritable raft of educational and instructor droids flood the Core Worlds through the
  millennia, many cultures continue to advocate the ancient discipline of lecturing. One manufacturer sought to combine
  both approaches in a single laminanium shell. Industrial Automaton's popular TTS 15-series education and tutorial
  droid was modified with further dialectic and communcations modules to create the TTS20, one of the most successful
  orator droids in the galaxy.

  Programmed in over a million styles and disciplines of organized argument and debate, this droid is the best foil for
  any being training to be a solicitor, diplomat, or negotiator. Often the pressures of its contentious programing will
  cause individual units to develop a particularly quarrelsome personality if their buffers are not cleared regularly.
  Strangely enough, however, some owners of the TTS20 series see this as an added feature and will encourage their
  droids to develop even greater heights of insolent confrontation.
encumbrance: 0
rarity: 7
