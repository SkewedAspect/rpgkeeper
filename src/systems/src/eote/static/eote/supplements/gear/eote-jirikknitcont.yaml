id: eote-jirikknitcont
name: Ji Rikknit (100 Dose Cargo Container)
description: >-
  Cultivated from the ovum sacks of rikknits of New Plympto, a world located about midway between Corellia and Duro
  along the Corellian Trade Spine, ji rikknit is a highly-addictive narcotic. For centuries, several Corellian trade
  cartels have made vast fortunes off rikknit eggs and processed ji rikknit, which is popular in spice dens across the
  galaxy.

  Ji rikknit provides no benefits save a mildly euphoric feeling in the user. However, if someone tries the narcotic,
  they must make an **Easy (<difficulty></difficulty>) Resilience check** or gain a 1 value Addiction Obligation.
encumbrance: 5
rarity: 7
reference:
  - SoF:103
