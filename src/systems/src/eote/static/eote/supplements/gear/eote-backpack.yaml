id: eote-backpack
name: Backpack
description: >-
  A backpack can serve many important functions: it can be used for carrying survival gear or even smaller allies and
  droids. Most are simple affairs of fabric and straps, with better styles including internal bracing and back support
  so that heavier weights can be carried far longer.

  Backpacks increase the character's encumbrance threshold by 4.

  **Models Include:** Numerous Variants.
encumbrance: 0
rarity: 1
