id: eote-alchemyneuralcharm
name: Neural Charm
description: >-
  This talisman often is worn as a circlet or pair of large earrings, and works to accelerate thought processes even in
  non-organic beings. Though stressful to use, it can ensure the wearer remembers a vital fact just in the nick of time.

  While wearing this talisman, when the user makes a Knowledge check, they may suffer a number of strain up to their
  Intellect characteristic. If they do, they add <boost></boost> equal to the strain suffered this way to the check.
encumbrance: 0
rarity: 7
reference:
  - UP:84
