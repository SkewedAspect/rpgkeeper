id: eote-droide522
name: E522 Assassin Droid
description: |-
  The E522 is one of the most feared droids operating in the galaxy today. These burly, hard-hitting droids were
  originally designed during the buildup to the Clone Wars by Techno Union member corporation Baktoid Combat Automata
  (BCA). Initially part of BCA's successful B-series battle droid line, the E522 was envisioned as a light anti-armor
  and anti-aircraft unit that would provide heavy support to platoons of B1 and B2 units. They were seen as too
  expensive and complex to serve as disposable droid soldiers, however, and the project was scrapped in favor of the B2
  and B3 battle droid units.

  When the Clone Wars finally ended with the destruction of both the Republic and the Separatists, the Techno Union
  dissolved, and its member corporations either struck out on their own or were brought under direct Imperial control.
  BCA was one of the companies nationalized by the Empire, and it was immediately slated for breakup. Through the
  process of BCA's breakup and the selling off of its various assets, all data from the E522 project fell into the hands
  of Sienar Intelligence Systems. SIS had been working on plans for its own line of combat and assassin droids, and the
  acquisition of the E522 R&D data was a huge boon to its project. SIS quickly scrapped its in-house project and poured
  an immense amount of time and money into bringing the E522 project to fruition. Within a year, the first E522s rolled
  out of SIS's assembly line and straight into the growing unrest leading up to the Galactic Civil War.

  As much a front-line combat droid as an assassin unit, the E522 is a massive, hulking construct festooned with heavy
  weapons and covered in thick, military-grade armor. It has a rounded, diamond-shaped torso with no discernible head,
  an extremely narrow waist that rotates 360 degrees, and two heavy tank treads covered in armored skirts in place of
  legs. Two long, multi-jointed arms sprout from armored shoulders and are equipped with a heavy repeating blaster,
  heavy ion blaster, and rapid-fire needler gun in place of hands. Three smaller arms with highly dexterous hands are
  mounted low on the droid's torso to take care of fine work, and a mini-missile launcher is mounted to the droid's
  back. Scattered about the droid's body is an array of sensors, antennae, and photoreceptors that grant the E522
  360-degree full-spectrum vision. The vision system, combined with a powerful on-board combat computer and targeting
  system, makes these droids a terror on the battlefield.

  There are currently fewer than one hundred E522 droids operating in the galaxy. Most of these are in active service
  with Imperial Army Intelligence and the Imperial Security Bureau as assassins and support units for various Imperial
  black ops. These droids, with their regular memory wipes and maintenance, retain the silent and intimidating
  personalities that their Sienar programmers gave them. A handful have fallen into the hands of the Alliance, mostly as
  battlefield salvage. They are serving the Alliance well in roles similar to those in which they served the Empire.
  E522s in the Alliance have developed gruff, demanding, cynical personalities that agents who work with them describe
  as "like everyone's least favorite Master Sergeant." Despite this, Alliance E522s are well liked and respected for
  their bravery and competence in the field.
