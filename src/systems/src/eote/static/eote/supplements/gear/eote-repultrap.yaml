id: eote-repultrap
name: Repulsor Trap
description: >-
  These traps for sentient beings subvert repulsorlift technology to create localized patches of extremely high gravity.
  When targets pass over an active repulsor trap, intense localized gravitational forces rob them of their ability to
  move. Repulsor traps are unobtrusive, adding <setback></setback><setback></setback> to all Perception checks made to
  notice these devices.

  Any single target who comes within engaged range of an active repulsor trap is ensnared (see **Ensnare**, on page 169
  of the **Age of Rebellion** Core Rulebook) for six rounds.
encumbrance: 7
rarity: 9
reference:
  - FLT:60
