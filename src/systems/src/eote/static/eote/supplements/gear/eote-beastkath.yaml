id: eote-beastkath
name: Kath Hound
description: The kath hounds of Dantooine are a species of fierce canine pack hunters, averaging about one meter tall at
  the shoulders. There are a number of subsepcies of kath hounds including variants with powerful, curvingforns although
  all are notable for their cloven hooves, thick fur and strong jaws. Some xenobiologists attempt to categorize some
  varieties as more powerful or dangerous than others, but in truth all members of the species are lethal hunters,
  especially when hunting alongside their pack mates. Alone or in packs, kath hounds have been trained as guard or
  attack animals across the galaxy for centuries. Some attempts have been made to breed or genetically engineer improved
  versions of the species, such as the highly aggressive and near uncontrollable salky hounds, but few real improvements
  have been made.
encumbrance: 0
rarity: 6
