id: eote-beastrunderen
name: Runderen
description: >-
  Packs of quarter meter long runderen are a common sight across the seedy underbellies and slums of cities across the
  galaxy. Whatever planet the short-tailed rodents came from originally, their capacity for camouflage has aided them in
  stowing away on ships and spreading to many locations. Once established in a new habitat, packs of runderen typically
  seek out whatever environment offers the most abundant source of food, typically feasting on plentiful garbage across
  districts that cannot afford extensive fighting to expose the dark-dwelling  creatures.

  If allowed to flourish, runderen can become nearly impossible to eradicate. They can regulate the hue and shade of
  their dark coats to better blend into the shadows of any area they inhabit, thanks to an array of subdermal chemical
  glands. Their fur always remains dark enough to make them stand out in bright light, but provided they have even a few
  shadows to scurry between, they  become extremely difficult to detect, much less evict.
encumbrance: 0
rarity: 1
reference:
  - SS:78
