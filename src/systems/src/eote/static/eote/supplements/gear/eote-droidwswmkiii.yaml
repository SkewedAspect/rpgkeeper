id: eote-droidwswmkiii
name: WSW Mk III "Harrier" Combat Remote
description: The WSW Mk III "Harrier" is a combat and training remote produced by Cybot Galactica . Roughly a meter
  across, these small droids are near-mindless drones that resemble small, stylized airspeeders. Shockingly aggressive
  and quite dangerous in groups, these constructs are deployed in en masse to overwhelm a target by sheer force of
  numbers. Even a single Harrier is a dangerous opponent, as it is quick and remarkably heavily armed, with a custom
  repeating blaster. Harriers can also be used as training remotes, as they possess built-in training software and a
  stun blaster that is used in place of the more lethal repeating blaster.
encumbrance: 0
rarity: 6
reference:
  - KoF:52
