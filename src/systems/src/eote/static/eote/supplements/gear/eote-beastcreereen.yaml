id: eote-beastcreereen
name: Creereen
description: |-
  Small, flight capable mammals that dwell in tight-knit nesting groups of up to a dozen individuals, creereen survie
  the atention of predators through their mobility and alertness. When trouble is spotted, the rodent-like flyers are
  able to alert their entire family group with a powerful shriek that disorients predators, while shielding other nearby
  creereen from negative effects.

  Animal trainers who have worked with these creatures have found that once creereen accept them or other designated
  individuals, the creatures can shield members of other species from their shriek as well. This trait means that while
  creereen are too easily frightened to serve as true guard animals, there is still a market for trained creereen or
  even full nesting groups that can serce as living alarm systems.
encumbrance: 0
rarity: 5
reference:
  - SS:74
