id: eote-droidcam
name: Cam Droid
description: >-
  Hologlide J57 Cam Droid

  Cam droids, or hovercams, are small, relatively simple droids equipped with repulsorlifts and recording devices. Used
  to record news, sports and entertainment events, as well as for security, cam droids are a common sight throughout the
  galaxy. As such, they are also ideal for scouting and espionage purposes, able to go virtually anywhere without
  drawing undo attention. While some cam droids are highly intelligent and capable of autonomous action, most are simple
  devices. Most cam droids can broadcast whatever they record in real-time, up to a distance of several kilometers,
  allowing the holovids to be rebroadcast or viewed by a remote operator.
encumbrance: 0
rarity: 3
reference:
  - SoF:102
