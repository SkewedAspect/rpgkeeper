id: eote-talisbardotsph
name: Bardottan Sphere
description: |-
  One of the most powerful objects ever encountered by the legendary Jedi Master Mace Windu was the Bardottan Sphere, a
  Force artifact designed to capture the Force from living beings and store it as though in some battery. The Sphere
  could focus the captured energy into a Force wielder when certain mystical and gravitational effects were applied. Now
  held by the Dagoyan mystics of Bardotta, the Sphere became known on that planet when Master Windu rescued the
  Bardottan sovereign, Queen Julia, from the clutches of the Nightsisters, an organization of dark side Force adepts.

  Whether the Nightsisters constructed the Sphere or discovered it is unknown, and the Bardottans have denied all
  requests to access the studies of the artifact that might reveal its provenance. Exhaustive records searches have
  found no mention of such an item either before or since Windu’s encounter with the Nightsisters. It seems likely the
  item is unique and was crafted by the Nightsisters or their allies shortly before its use during the events
  surrounding the kidnapping of Queen Julia.

  In appearance, the Sphere is not particularly notable. It takes the form of a large crystalline sphere of milky
  transparency, its color dependent on the light it reflects. It is only when a Force-sensitive being attuned to the
  Sphere wills it to a semblance of mineral life that the Sphere glows with an internal light and works its “magic.”
  When activated in this manner, the Sphere forms a link with a nearby living creature, as directed by the controlling
  Force sensitive. In theory, this could be any living being, as the Force surrounds and penetrates all things, but in
  practice, the Nightsisters and their minions seem to have chosen only sentients as their targets. Once the link has
  been established, the Sphere cuts off the target’s connection with the Force and then drains the Force contained
  within the target’s living self, leaving behind a husk bereft of life. The exact mechanisms of this process are, as
  with so many Force artifacts, unclear. The Sphere is obviously not mechanical in nature, and neither can it be said to
  be living. It has been theorized that the Sphere, when inert, is in fact a sort of anti-Force artifact, cut off from
  the universe and reflecting the all-surrounding Force away from itself. If this is true, say those who hold this
  theory, then a type of “Force vacuum” exists within the bounds of the Sphere, one that naturally attracts the Force
  when the Sphere becomes active.

  The Nightsisters did not use the Sphere as a simple tool of execution, however. The Sphere not only drains the Living
  Force from its victims, but also stores what it has stolen for a time. The Nightsisters could then tap into that
  stored Force, using it to fuel any number of Force powers to much

  greater effect than they could on their own. The Bardottan Sphere, then, is a power booster for Force users, its power
  being purchased at the ultimate price, paid by those its users have targeted.

  In its history and recorded use, the Sphere of the Nightsisters has been understood as a tool of evil and murder. To
  be sure, there is little to suggest that it was created with anything but the literal theft of life in mind. However,
  at least some of the Dagoyan mystics who guard the Sphere today are said to have taken on a more curatorial role,
  studying the Sphere with an eye toward using its considerable powers in a benign way, more in keeping with their
  relatively peaceful philosophies. These Bardottans have begun to agitate for more access to the Sphere, arguing that
  if they can plumb its mysteries, they can control its effects, and perhaps find ways to utilize its curious binary
  nature as an object that sometimes reflects the Force and sometimes absorbs it. The discussion about whether to pursue
  this course of action usually ends there, though, as those who wish to activate the Sphere have thus far been unable
  to formulate detailed plans for its use that meet with the approval of Bardotta's sovereign and the Dagoyan council.
  The activist scholar-mystics argue that they must first be allowed greater access to the Sphere before they can
  provide any such details, but their requests have been denied as being too fraught with potential danger.

  While the Sphere is in a character’s possession, the character’s Force rating increases by one. If the character
  sacrifices a living being to store its life force in the Sphere, then the character’s Force rating increases by the
  Force rating of the sacrificed being, as long as that creature’s Force rating was 1 or higher. However, a character
  who uses the Sphere during a session gains 5 Conflict at the at the end of the session, in addition to any Conflict
  accrued due to any sacrifices the character makes to power the Sphere.
encumbrance: 0
rarity: 10
reference:
  - NoP:109
