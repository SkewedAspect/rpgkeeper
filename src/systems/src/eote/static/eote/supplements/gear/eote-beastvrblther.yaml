id: eote-beastvrblther
name: Vrblther
description: >-
  Vrblthers are agressive predators found across the moon of Nar Shaddaa, although they are believed to have originated
  on the Hutt homeworld of Varl. Humanoid in appearance, they have heavily clawed arms, horned heads and large teeth
  making vrblthers lethal fighters that are able to take down most foes. The creatures run rampant and feral on the
  lower levels of the Smuggler's Moon, hunting in packs for anything or anyone they can catch.

  The Hutt crime lords of Nar Shaddaa find the vicious creatures and their activities endlessly amusing, and some Hutts
  bring a gunting pack with them when traveling to other worlds. It is possible that vrblthers have established
  populations on other worlds after having been transplanted there by Hutts, just as those on Nar Shaddaa arrived from
  Varl.
encumbrance: 0
rarity: 3
reference:
  - SS:79
