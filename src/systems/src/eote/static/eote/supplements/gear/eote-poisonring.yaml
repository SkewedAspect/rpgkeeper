id: eote-poisonring
name: Poisoner's Ring
description: >-
  Produced by a wide variety of artisans, the poisoners ring (or any other accessory of a similar nature) outwardly
  looks like the sort of elegant jewelry commonly worn by aristocrats and wealthy folk. The ring has a much mom
  practical use, though. The largest gem or similar feature of the piece has been hollowed out from the rear, creating a
  small cavity. By means of a painstakingly constructed hinge, the wearer can access the tiny space within. Any
  substance could be concealed in the space, but most commonly, it is used to carry a dose of deadly poison. With
  carefully practiced motions, the wearer can deposit the fatal cargo into a cup, plate, or bowl with little chance of
  being noticed.

  A poisoner's ring can hold a single dose of any poison (such as those on page 182 of the **Age of Rebellion** Core
  Rulebook, or any other poison the GM deems appropriate). As an action, a character wearing the ring may make an
  opposed Skulduggery check against any onlookers' Vigilance to deposit the contents into a target's meal or beverage
  without being noticed.

  **Models include:** Beladonab concealment jewelry, countless custom models.
encumbrance: 0
rarity: 7
reference:
  - DA:52
