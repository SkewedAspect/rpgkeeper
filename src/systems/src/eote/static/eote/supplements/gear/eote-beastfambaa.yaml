id: eote-beastfambaa
name: Fambaa Riding Beast
description: The enormous fambaa are have been famously domesticated by Gungans for thousands of years on Naboo, but
  have long been exported to many other worlds including Onderon. They are sometimes compared to the much smaller
  devvbacks, to which they bear some physiological similarities. Herbivorous creatures, fambaa are most often used as
  beasts of burden. They are also effective multi-passenger mounts, having seen combat action in the Grand Gungan Army
  in the decade before the Clone Wars. Despite their immense size, they are docile creatures, and are rarely phased or
  startled, even by the noise of battle. Gungans used them to carry immense shield generators, cannons, or armored
  howdahs that could transport numerous individuals into battle.
encumbrance: 0
rarity: 4
reference:
  - SoT:86
