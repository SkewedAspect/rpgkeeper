id: eote-commmedmanip
name: Communications Media Manipulator
description: |-
  Professional media producers rely on large studios and high-end equipment to produce content for distribution, but
  those on the move often require equipment that is compact and portable. For them, Chedak Communications produces an
  advanced media manipulator suite. Easily installed in a small spaceship or even a larger landspeeder, it enables the
  user to create, manipulate, and produce a wide variety of media. Whether printing posters or carefully "enhancing"
  hobos, the media manipulator is the perfect tool for on-the-go media production.

  **Models include:** Chedak Communications Media Manipulator, NisdiGen Suite 60.
encumbrance: 6
rarity: 6
reference:
  - DA:50
