id: eote-droidct4med
name: CT-4 Medical Droid
description: |-
  Polis Massa Pria Assemblage CT-4 Medical Droid

  The CT-4 series medical droids are manufactured in Polis Massa by Polis Massa Pria Assemblage, and are almost
  exclusively used there. They are similar in many respects to the EW-3 midwife droid but are more generalized in their
  application. A handful of the units are on loan to the Rebel Alliance, though they are rarelv used awav from the Rebel
  Fleet.

  Specializing in the application of bacta, the CT-4 possesses programming that makes it familiar with thousands of
  sentient species and their physiological peculiarities. Their personalities are caring and thoughtful, and their
  relatively small size and nonhuman shape rarely sets patients at ease in the same way as does the more familiar 2-1 B
  surgical droid.
encumbrance: 0
rarity: 8
reference:
  - SoR:112
