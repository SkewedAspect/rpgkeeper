id: eote-packmil
name: Military Pack
description: |-
  This is a standard military-issue backpack used to stow and carry tents, rations, canteens, excavation tools, and all
  manner of other gear the soldier needs in the field. It is constructed of durable and lightweight materials able to
  withstand a broad range of environmental conditions while adding as little as possible to the soldier's load. The
  Imperial Army's military packs are available in a variety of uniform specifications and camouflage patterns.

  This pack increases the user's encumbrance capacity by 6, but has the Cumbersome 2 quality.
encumbrance: 0
