id: eote-droidprot5yq
name: 5YQ-Series Protocol Droid
description: The protocol droids of the 5YQ-series, while perfectly functional mediators, are widely regarded as cheap
  knockoffs of more popular models. They were produced by Cybot Galactica to compete with Serv-0-Droid Incorporated's
  near monopoly on sales in the Mid Rim, but the project was not given adequate resources to break into such a diverse
  market. The 5YQ design team ended up recycling most of the work done on the earlier 3P0-series, but replaced the deep
  cultural databases previously used with a wide but shallow array of details on every conceivable topic. The final
  result was a droid that could operate in any part of the galaxy, but with considerably less effectiveness than a more
  specialized model. Given time, the 5YQ line might have been able to develop a market, but the production lines were
  shut because of a lawsuit against Cybot Galactica for using Serv-O-Droid parts in the 5YQ-series. This was the final
  black mark for the line, leaving them with a market share far lower than their relatively unremarkable performance
  would merit.
encumbrance: 0
rarity: 3
