id: genesys-archetype-mongrel
name: Mongrel
description: The so-called mongrels are products of science run amok. In Sovereigns of Steam these poor creations were
  once human, but they had the misfortune of becoming the experimental fodder of some mad reject from the Royal Society.
  This depraved scientist used them to test a certain alchemical elixir that unlocks their inner bestial nature, turning
  them into a monstrous hybrid of human and animal. After a time, the elixir can wear off, returning these poor
  individuals to their human form. However, the dark secret is that once the elixir enters the blood, it works
  irrevocable changes on the imbiber's biology. Thus, the change can return at any time. In our setting, unscrupulous
  smugglers have been returning this elixir to major cities for various reasons. So, while your character could have
  been the unfortunate results of a forbidden experiment, they also could have been exposed to the elixir in their daily
  life. Of course, once they drank it, their life changed forever! Needless to say, so-called mongrels are shunned in
  all levels of society, and they are actively hunted by various agencies of the Empire. Many flee to the Colonies to
  escape persecution and arrest.
characteristics:
  brawn: 2
  agility: 2
  intellect: 2
  cunning: 2
  willpower: 2
  presence: 2
woundThreshold: 10
strainThreshold: 8
startingXP: 100
abilities:
  - name: The Beast Within
    description: Mongrels generally look just like any other human. However, when your character is incapacitated due to
      exceeding their strain threshold while in human form, they undergo the following change as an out-of-turn
      incidental. They heal all strain; increase their Brawn and Agility by one, to a maximum of 5; and reduce their
      Intellect and Willpower by one to a minimum of 1. They deal +1 damage when making unarmed attacks, and their
      unarmed attacks have a Crit rating of 3. In addition, their jaws elongate into muzzles, their hair thickens and
      they grow more all over their bodies, and their eyes become those of a hunting cat or wolf. Your GM should ensure
      that NPCs react appropriately to this (at the very least, upgrading the difficulty of all social skill checks
      twice). Your character reverts to human form after eight hours, or if they are incapacitated (by exceeding either
      their wound threshold or their strain threshold).
  - name: The Human Spirit
    description: |-
      Once per session, your character may make a Hard
      (<difficulty></difficulty><difficulty></difficulty><difficulty></difficulty>) Discipline check as an out-of-turn
      incidental. If they succeed, they may either trigger The Beast Within or avoid triggering it when they exceed
      their strain threshold.
skillModifiers: []
reference: G-CRB:15
