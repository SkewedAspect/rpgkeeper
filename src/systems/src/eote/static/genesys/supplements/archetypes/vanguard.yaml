id: genesys-archetype-vanguard
name: Vanguard
description: Our vanguard species is an alien race that is humanity's superior in the galaxy. These aliens are more
  advanced scientifically, culturally, and even artistically than us poor, primitive humans—which inevitably makes it
  all the more satisfying when the human protagonist of a story accomplishes something they thought impossible.
