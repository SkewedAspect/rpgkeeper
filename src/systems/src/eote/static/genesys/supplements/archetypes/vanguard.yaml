startingXP: 100
abilities:
  - name: Space Is Our Birthright
    description: A vanguard adds automatic <advantage></advantage> to the results of any Astrocartography or Knowledge
      checks they make.
  - name: High Tech Baubles
    description: A vanguard starts the game with an additional 500 credits' worth of starting gear (this is in addition to
      their normal starting gear allowance).
