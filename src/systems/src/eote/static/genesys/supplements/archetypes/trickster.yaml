id: genesys-archetype-trickster
name: Trickster
description: Without powers from birth, native magic, or even particular strength at arms, some mortals are still able
  to rise to greatness through their brainpower.
characteristics:
  brawn: 2
  agility: 2
  intellect: 2
  cunning: 3
  willpower: 1
  presence: 2
woundThreshold: 10
strainThreshold: 10
startingXP: 100
abilities:
  - name: Too Clever by Half
    description: Once per session before your character makes a skill check with <boost></boost> in the dice pool, you may
      spend a Story Point to double the number of <boost></boost> currently in the dice pool. If your character fails
      the check, they suffer 6 strain in addition to any other penalties.
skillModifiers: []
reference: G-EPG:11
