id: genesys-archetype-giant
name: Giant
description: Giants are massive, exceptionally powerful beings, many of whom reach three meters in height. Their nature
  is as extreme as their forms; giants are as quick to boom out a laugh as they are to launch themselves into a frothing
  rage. Giants are incredibly social creatures, although this social nature tends to manifest as some combination of
  constant jeers, threats, and deafening roars. Whether to bully or simply to have someone bear witness to their
  superiority, they feel the need to have others around them, and they usually become sullen and despondent when left
  alone too long. A lone giant, as the saying goes, is a lonely giant. Because they might otherwise all too frequently
  kill one another attempting to establish clear leaders, they often use the appearance of strength rather than physical
  confrontation to establish dominance. This leads giants to pursue acquisition of the largest weapons, the armor with
  the most spikes, the fiercest mechanical augmentics, or enough scars to look as though they must have already died and
  ascended to Vanhalla, all to lessen the frequency of lethal challenges. After all, if a giant weren't tough enough to
  keep such gear, a stronger giant would've come along and taken it. Giants usually wear what they want. This is mostly
  a mix of armor slabs, huge spikes, and crude yet powerful cybernetics, They also favor tattoos along with face and
  body paint to honor their forebears, hopefully assume the power of various beasts, or promote their favorite bands.
  They are rarely found without weapons, usually huge axes or hammers amplified with energy blasters, jet engines,
  explosives, or other subtle refinements. For a giant, subtlety might mean skipping the tenth round of Æmbrew before
  setting themself on fire with screaming fireworks and charging into a platoon of martians. Or deciding against
  strapping the eleventh robotic skull on their favorite rocket axe, because "maybe it's too clanky." Or sounding a
  savage, Crucibleshattering roar of joy each and every time they belch.
characteristics:
  brawn: 3
  agility: 2
  intellect: 1
  cunning: 2
  willpower: 2
  presence: 2
woundThreshold: 12
strainThreshold: 8
startingXP: 90
abilities:
  - name: Size Matters
    description: A giant is silhouette 2 and increases their encumbrance threshold by 2.
  - name: Mighty Roar (and Mightier Breath)
    description: When an engaged opponent makes a check targeting a giant, as an out-of-turn incidental the giant may suffer
      2 strain and add <setback></setback><setback></setback> to the dice pool.
skillModifiers: []
reference: SotC:26
