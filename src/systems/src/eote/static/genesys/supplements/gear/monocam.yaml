id: genesys-gear-monocam
name: Monocam
description: Popular with newscasters, videographers, and aspiring filmmakers, monocams are small digital video
  recorders worn over one or both eyes like a monocle or glasses. A monocam is not a computer, but allows your character
  to record any visuals they see and download the recordings to a linked computer or PAD.
encumbrance: 0
rarity: 2
reference: SotB:98
