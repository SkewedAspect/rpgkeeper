id: genesys-gear-warding-talisman
name: Warding Talisman
description: "Warding Talismans have a form and appearance similar to beautifully crafted silver ailettes: small badges
  in the shape of shields worn on the upper chest or shoulder. They don't offer much physical protection, but they carry
  enchantments that can cause an opponent's strike to falter or go awry. While wearing a Warding Talisman, your
  character increases their defense by one."
encumbrance: 0
rarity: 6
reference: RoT:110
