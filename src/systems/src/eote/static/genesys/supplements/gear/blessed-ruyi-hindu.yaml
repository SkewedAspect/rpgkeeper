id: genesys-gear-blessed-ruyi-hindu
name: Blessed Ruyi (Hindu)
description: A Ruyi is a ceremonial scepter with an S-shaped handle and a head that is often fashioned into a fist or
  cloud. They can be crafted out of all manner of valuable materials, from gold, to jade, to coral. A Ruyi that has been
  divinely blessed is said to bring good luck to the bearer. While holding a Blessed Ruyi, your character may reroll one
  or more <boost></boost> in their pool once when making a check.
encumbrance: 1
rarity: 9
reference: G-EPG:14
