id: genesys-gear-heal-x-tab
name: Heal-X Tab
description: Given the wide range of species in the Local Group, it was only a matter of time before an enterprising
  medical firm arrived at a truly universal first aid application for both organic and inorganic beings. The most common
  brand name for these small items is heal-x, though there are other versions, such as omnibalm, stimmup, and zap. Small
  and easily administered via a capsule, skin patch, or injection, each dose consists of dehydrated nanobots, jellied
  repleniflesh, and, of course, a tiny amount of Æmber. A heal-x tab works exactly the same as a painkiller (see page 94
  of the Genesys Core Rulebook; heal-x is just the setting-specific name), but it also works on inorganic life forms,
  such as robots and even spirits. All the rules, talents, and abilities governing and affecting a painkiller apply to a
  heal-x tab as well.
encumbrance: 0
rarity: 2
reference: SotC:149
