id: genesys-gear-scrap
name: Scrap
description: Scrap (1 piece) Scrap can be all sorts of ruined, broken, or scavenged trash and gear. Although they have
  no intrinsic value, some pieces of scrap can be fashioned into useful items. Some cultures may even use smaller pieces
  of scrap (such as keys, paper clips, or the caps from bottles) as currency. When your character is attempting to make
  homemade versions of a regular item (see page 34), your GM should have pieces of scrap be the default raw material
  (how much scrap and if anything else is needed is up to the GM). What exactly each piece of scrap is has been left up
  to you and your GM to decide.
encumbrance: 1
rarity: 0
reference: G-EPG:36
