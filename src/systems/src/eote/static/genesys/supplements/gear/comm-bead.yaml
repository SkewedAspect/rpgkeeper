id: genesys-gear-comm-bead
name: Comm-Bead
description: This communications device fits into a sentient's ear (or other auditory orifice) and allows them to
  communicate with friends and allies within 100 kilometers. If the comm-bead can tie into a planetary communications
  network (the kind that any civilized planet has), then it can communicate with anyone on the same planet.
encumbrance: 0
rarity: 1
reference: G-CRB:186
