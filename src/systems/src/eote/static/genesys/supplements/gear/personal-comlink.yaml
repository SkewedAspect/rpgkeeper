id: genesys-gear-personal-comlink
name: Personal Comlink
description: Modern-day walkie-talkies, comlinks are small, secure devices used for personal communication. They have a
  limited range but are unaffected by buildings and other obstacles. Comlinks are cheap and readily available, and they
  have the added bonus of being largely untraceable (as they only operate with a specified network of comlinks).
encumbrance: 0
rarity: 4
