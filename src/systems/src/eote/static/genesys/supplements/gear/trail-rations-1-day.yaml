id: genesys-gear-trail-rations-1-day
name: Trail Rations (1 day)
description: Most races craft daily trail rations to be compact as possible and last as long as possible without molding
  or rotting. Any edibility is incidental. Trail rations generally include smoked jerky with the consistency of shoe
  leather, biscuits that can double as sling bullets, and bricks of fat mixed with berries and ground dried meat. Elves,
  of course, forgo such foodstuffs and subsist off a mix of delectable dried fruits, cunningly preserved cheeses, and
  thin-baked bread that lasts for months without losing its light and fluffy texture. Without exception, travelers from
  other races resent them mightily for this.
encumbrance: 0
rarity: 0
reference: RoT:101
