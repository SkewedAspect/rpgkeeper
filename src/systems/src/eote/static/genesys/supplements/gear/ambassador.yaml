id: genesys-gear-ambassador
name: Ambassador
description: "This pocket-sized device can analyze and translate any language spoken near it into another language
  (assuming that both languages have been loaded into its considerable memory banks). Mating an ambassador to a specific
  comm-bead, computer, or savant is a simple process, but the device can also be set to broadcast mode. This allows the
  ambassador's onboard speakers to verbalize the translated words of another being. This item may be modified with 2-1:
  Cultural Manufacturing Differences."
encumbrance: 1
rarity: 2
reference: EotI:120
