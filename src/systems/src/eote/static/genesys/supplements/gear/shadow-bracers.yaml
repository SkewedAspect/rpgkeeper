id: genesys-gear-shadow-bracers
name: Shadow Bracers
description: These black bracers are embossed with curved fluting and polished with an iridescent lacquer. They steadily
  emit a fine black mist that is odorless and safe to breathe but capable of obscuring vision. In combat, the unnatural
  mist given off by the bracers envelops the wearer, obscuring them and making them harder to hit. The effect of the
  bracers is unnerving, and leaves opponents with a sense of doom. While wearing Shadow Bracers your character benefits
  from concealment worth +2 dice (see the Concealment (Darkness, Smoke, and Intervening Terrain) section on page 110 of
  the Genesys Core Rulebook). In addition, your character's melee attacks gain the Disorient item quality.
encumbrance: 0
rarity: 10
reference: RoT:109
