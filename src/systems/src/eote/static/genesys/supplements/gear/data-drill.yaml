id: genesys-gear-data-drill
name: Data Drill
description: "This remarkable device allows a user to bypass the security software and protections on computers. The
  drill pairs with another device, such as a savant or quintisensor, for processing and guidance. When a data drill is
  set, it begins to electronically carve its way through the computer's security systems. It is highly effective, though
  a bit time consuming. A data drill also has a tendency to \"drill\" too much data, sometimes damaging the information
  the user is seeking. A data drill adds <success></success><success></success><despair></despair><despair></despair> to
  the results of any Computers checks your character makes to access a computer system and to the results of any
  Skulduggery checks your character makes to open a computerized lock. This item may be modified with 2-1: Cultural
  Manufacturing Differences."
encumbrance: 0
rarity: 6
reference: EotI:120
