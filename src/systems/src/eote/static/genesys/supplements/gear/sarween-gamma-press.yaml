id: genesys-gear-sarween-gamma-press
name: Sarween Gamma Press
description: "The gamma press is an antigrav repulsor jack. The pressure exerted using its two nearly unbreakable
  mandibles can force open airlocks and pry apart debris fused during a collision. The tool is a favorite among
  scavengers, although emergency rescue teams benefit from it when attempting to gain entry to crashed vessels to save
  potential survivors. This item may be modified with 2-1: Cultural Manufacturing Differences."
encumbrance: 4
rarity: 4
reference: EotI:125
