id: genesys-gear-data-crystal
name: Data Crystal
description: "A data crystal, or data crystal matrix, is a small device a few centimeters long with a crystalline
  structure and a universal link port in its base. The crystal is incredibly durable, and when it is full of data, it
  glows in any one of a range of colors (the particular color can be set by the user to facilitate organization or
  filing). This item may be modified with 2-1: Cultural Manufacturing Differences."
