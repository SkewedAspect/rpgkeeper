id: genesys-gear-smartspecs
name: Smartspecs
description: Smartspecs allow an individual without a skulljack or cybereyes to interface with smart technology.
  Available in a variety of styles, from bulky welder-style goggles to stylish aviator goggles and wraparound shades,
  smartspecs are one of the easiest ways to enjoy the benefits of smart tech. Most sets of smartspecs are wireless and
  can sync up to as many as four smart systems at once. Information is displayed on the goggles and appears in the
  wearer's peripheral vision. Smartspecs are not a computer, but may be linked to a computer. They provide a heads-up
  display for the computer.
encumbrance: 1
rarity: 3
reference: SotB:99
