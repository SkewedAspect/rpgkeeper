id: genesys-gear-bedroll
name: Bedroll
description: Whether camping beneath the boughs of the Aymhelin, sleeping on a dune in the Sunderlands, or lying amid
  the rubble of a ruined castle, a good bedroll can be just what one needs to get a restful night's sleep. Bedrolls
  usually consist of a thick lower blanket for padding and an upper blanket for warmth. Wealthier individuals sometimes
  use blankets treated with an alchemical resin to resist rain and damp.
encumbrance: 1
rarity: 1
reference: RoT:100
