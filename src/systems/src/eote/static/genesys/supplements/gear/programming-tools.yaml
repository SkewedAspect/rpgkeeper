id: genesys-gear-programming-tools
name: Programming Tools
description: Most of these kits come with pre-scripted, omni-OS modules that can be quickly assembled to form a variety
  of programs. Programmers can then use them to add helpful abilities to non-sentient devices of almost any nature.
  Sometimes, though, they can improve a system just a bit too much… Programming tools decrease the difficulty of
  Computers checks the owner makes to create new software for a non-sentient computer system by one. <threat></threat>
  may be spent to make this system self-aware (and friendly), while the GM may spend <difficulty></difficulty> to do the
  same, but make the newly sentient system quite upset with their creator.
encumbrance: 0
rarity: 5
reference: SotC:150
