id: genesys-gear-seven-league-bootswinged-sandals-bretengreek
name: Seven-League Boots/Winged Sandals (Breten/Greek)
description: Shoes that allow the wearer to move very fast feature in several mythologies. Wearing these Seelie (fairy)
  boots or winged sandals of the gods, a traveler can cover immense distances impossibly quickly. During narrative
  encounters while wearing the Seven-League Boots or Winged Sandals, your character may walk supernaturally quickly (the
  exact speeds are up to the GM, but should be in the range of a kilometer every few steps). During structured
  excounters, your character may spend a move maneuver to move to any location within extreme range of their current
  position.
encumbrance: 1
rarity: 9
reference: G-EPG:14
