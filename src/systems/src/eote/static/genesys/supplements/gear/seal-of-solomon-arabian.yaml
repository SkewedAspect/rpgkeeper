id: genesys-gear-seal-of-solomon-arabian
name: Seal of Solomon (Arabian)
description: This elaborate signet ring bears two interlaced triangles forming a star. It was forged by God in brass and
  iron and given to King Solomon. The seal gives the wearer the ability to speak to animals and supernatural beings such
  as jinn. The seal can also be sued to stamp written directives that supernatural creatures and beings are compelled to
  obey. While wearing the Seal of Solomon, your character may speak with and understand all living and supernatural
  creatures and being (this does not give the target any additional intelligence, so it's up to your GM what they can
  discuss). In addition, once per session, your character may write out a directive for a single supernatural creature
  or being within extreme range stamp it with the Seal of Solomon. That entity must make a successful
  <difficulty></difficulty><difficulty></difficulty><difficulty></difficulty><difficulty></difficulty><difficulty></difficulty>
  or do exactly what the directive instructs it to do.
encumbrance: 0
rarity: 10
reference: G-EPG:14
