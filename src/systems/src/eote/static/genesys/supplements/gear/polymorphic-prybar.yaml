id: genesys-gear-polymorphic-prybar
name: Polymorphic Prybar
description: "A polymorphic prybar is a simple yet versatile tool that is often found in toolboxes and field kits. It is
  composed of malleable matter that allows the user to position the tool and then bend, flex, and elongate the prybar to
  the desired position and angle. The wielder then activates the prybar, causing it to go rigid, allowing it to be used
  as a lever to help open, lift, or even bludgeon an object. This item may be modified with 2-1: Cultural Manufacturing
  Differences."
encumbrance: 1
rarity: 3
reference: EotI:125
