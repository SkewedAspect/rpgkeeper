id: genesys-gear-elven-boots
name: Elven Boots
description: Whether due to enchantments cast upon them during their construction or merely because of the superlative
  skill of Elven cobblers, these boots are renowned for providing their wearers with surefootedness, superior ankle
  support, and extreme comfort. An adventurer wearing Elven Boots will find themselves able to hike tirelessly through
  difficult terrain and outpace companions in mundane footwear. While wearing Elven Boots your character reduces the
  number of maneuvers required to change range bands by one, to a minimum of 1. Elven boots have an encumbrance of 0
  when worn.
encumbrance: 1
rarity: 6
reference: RoT:109
