id: genesys-gear-warding-icon
name: Warding Icon
description: A warding icon protects against the occult and can be worn around the neck or on one's clothing. If your
  character is wearing a warding icon, any supernatural or occult creature engaged with them is disoriented while they
  remain engaged.
encumbrance: 0
rarity: 7
reference: G-CRB:163
