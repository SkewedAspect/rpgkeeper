id: genesys-gear-cybernetic-replacements-internal-organ
name: Cybernetic Replacements (Internal Organ)
description: "After their wars with the Mahact Gene-Sorcerers, the ancient Lazax maintained strict laws against cloning.
  Ironically, during the Twilight Wars, most species showed more respect for those laws than they did for the Lazax
  themselves. Even today, clones and cloned body replacements are very illegal across most of the known galaxy. Instead,
  most species rely on cybernetics to replace failing organs or lost limbs. Traditionally, it is very rare to enhance
  oneself with a cybernetic, since this is seen as a slippery slope toward becoming the L1Z1X Mindnet, or the dreaded
  Nekro Virus. A cybernetic replacement can be installed on a character with a successful
  <difficulty></difficulty><difficulty></difficulty><difficulty></difficulty>. It functions identically to the lost limb
  or organ that it replaces. This item may be modified with 2-1: Cultural Manufacturing Differences."
encumbrance: 0
rarity: 4
reference: EotI:122
